name: Cache Dependencies

# This workflow ensures vendor, node_modules, and Playwright browsers are always
# cached for CI workflows. Runs on schedule and when dependency files change.

on:
  # Run daily to keep cache fresh
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC

  # Allow manual trigger
  workflow_dispatch:

  # Run when dependencies change
  push:
    paths:
      - 'ibl5/composer.json'
      - 'ibl5/composer.lock'
      - 'ibl5/bun.lock'
      - 'ibl5/package.json'
      - 'Dockerfile'
      - 'docker/opcache.ini'
      - 'docker/entrypoint.sh'
    branches:
      - master
      - develop

permissions:
  packages: write

jobs:
  cache-dependencies:
    name: Pre-cache Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # --- PHP Dependencies ---
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, intl, pdo, pdo_mysql

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('ibl5/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Cache vendor directory
        uses: actions/cache@v5
        id: vendor-cache
        with:
          path: ibl5/vendor
          key: ${{ runner.os }}-vendor-${{ hashFiles('ibl5/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-vendor-

      - name: Install Composer dependencies
        if: steps.vendor-cache.outputs.cache-hit != 'true'
        working-directory: ibl5
        run: composer install --no-progress --no-interaction

      - name: Verify PHPUnit
        working-directory: ibl5
        run: |
          if [ -f "vendor/bin/phpunit" ]; then
            echo "PHPUnit cached successfully"
            vendor/bin/phpunit --version
          else
            echo "PHPUnit not found!"
            exit 1
          fi

      # --- JS Dependencies ---
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache node_modules
        uses: actions/cache@v5
        id: node-modules-cache
        with:
          path: ibl5/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('ibl5/bun.lock') }}

      - name: Install JS dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        working-directory: ibl5
        run: bun install

      # --- Playwright Browsers ---
      - name: Get Playwright version
        id: playwright-version
        working-directory: ibl5
        run: echo "version=$(bunx playwright --version)" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: ibl5
        run: bunx playwright install chromium --with-deps

      # --- Playwright System Dependencies (apt packages) ---
      - name: Cache Playwright system deps (apt archives)
        uses: actions/cache@v5
        id: apt-cache
        with:
          path: ~/playwright-apt-cache
          key: ${{ runner.os }}-playwright-apt-${{ steps.playwright-version.outputs.version }}

      - name: Save apt archives from Playwright install
        if: steps.apt-cache.outputs.cache-hit != 'true'
        run: |
          # The --with-deps step above already downloaded and installed system packages.
          # Save the .deb files so e2e-tests can restore them from cache.
          mkdir -p ~/playwright-apt-cache
          cp /var/cache/apt/archives/*.deb ~/playwright-apt-cache/ 2>/dev/null || true
          echo "Cached $(ls ~/playwright-apt-cache/*.deb 2>/dev/null | wc -l) .deb files"

      # --- Docker Image ---
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push PHP image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/a-jay85/ibl5/php-apache:latest

      # --- Summary ---
      - name: Cache summary
        run: |
          echo "## Cache Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### PHP" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.vendor-cache.outputs.cache-hit }}" == "true" ]; then
            echo "- Vendor cache: already up-to-date" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Vendor cache: updated" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- Key: \`${{ runner.os }}-vendor-${{ hashFiles('ibl5/composer.lock') }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### JavaScript" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.node-modules-cache.outputs.cache-hit }}" == "true" ]; then
            echo "- node_modules cache: already up-to-date" >> $GITHUB_STEP_SUMMARY
          else
            echo "- node_modules cache: updated" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- Key: \`${{ runner.os }}-bun-${{ hashFiles('ibl5/bun.lock') }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Playwright" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" == "true" ]; then
            echo "- Browser cache: already up-to-date" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Browser cache: updated" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- Version: ${{ steps.playwright-version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Key: \`${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Playwright System Deps (apt)" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.apt-cache.outputs.cache-hit }}" == "true" ]; then
            echo "- Apt cache: already up-to-date" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Apt cache: updated" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- Key: \`${{ runner.os }}-playwright-apt-${{ steps.playwright-version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Docker" >> $GITHUB_STEP_SUMMARY
          echo "- PHP-Apache image: pushed to ghcr.io/a-jay85/ibl5/php-apache:latest" >> $GITHUB_STEP_SUMMARY
