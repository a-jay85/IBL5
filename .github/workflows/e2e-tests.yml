name: E2E Tests

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, ready_for_review, labeled]
  push:
    branches: [master]
    paths:
      - '**.php'
      - '**.ts'
      - '**.js'
      - '**.css'
      - 'ibl5/design/**'
      - 'ibl5/migrations/**.sql'
      - 'Dockerfile'
      - 'docker-compose*.yml'
      - 'docker/**'
      - 'ibl5/tests/e2e/**'
      - 'IBL6/**'
      - 'docker/Dockerfile.ibl6'
      - '.github/workflows/e2e-tests.yml'
      - '.github/actions/setup-docker-e2e/**'
      - '.github/scripts/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      src: ${{ github.event_name == 'push' || github.event.action == 'labeled' || github.event.pull_request.user.login == 'dependabot[bot]' || steps.filter.outputs.src == 'true' }}
    steps:
      - uses: dorny/paths-filter@v4
        id: filter
        if: github.event_name == 'pull_request' && github.event.action != 'labeled'
        with:
          filters: |
            src:
              - '**.php'
              - '**.ts'
              - '**.js'
              - '**.css'
              - 'ibl5/design/**'
              - 'ibl5/migrations/**.sql'
              - 'Dockerfile'
              - 'docker-compose*.yml'
              - 'docker/**'
              - 'ibl5/tests/e2e/**'
              - 'IBL6/**'
              - 'docker/Dockerfile.ibl6'
              - '.github/workflows/e2e-tests.yml'
              - '.github/scripts/**'

  playwright-version-drift:
    name: Playwright version drift guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify all surfaces pin v1.60.0-jammy
        run: |
          EXPECTED="v1.60.0-jammy"
          EXPECTED_NPM="1.60.0"
          fail=0
          grep -q "playwright:${EXPECTED}" ibl5/bin/visual-regression.sh \
            || { echo "drift: ibl5/bin/visual-regression.sh"; fail=1; }
          grep -q "playwright:${EXPECTED}" .github/actions/setup-docker-e2e/action.yml \
            || { echo "drift: .github/actions/setup-docker-e2e/action.yml"; fail=1; }
          grep -q "playwright:${EXPECTED}" .github/workflows/e2e-tests.yml \
            || { echo "drift: .github/workflows/e2e-tests.yml"; fail=1; }
          grep -q "\"@playwright/test\": \"${EXPECTED_NPM}\"" ibl5/package.json \
            || { echo "drift: ibl5/package.json"; fail=1; }
          grep -q "\"@playwright/test@${EXPECTED_NPM}\"" ibl5/bun.lock \
            || { echo "drift: ibl5/bun.lock"; fail=1; }
          grep -q "\"@playwright/test\": \"${EXPECTED_NPM}\"" IBL6/package.json \
            || { echo "drift: IBL6/package.json"; fail=1; }
          exit $fail

  e2e:
    name: Visual Regression
    needs: [changes]
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    # 30 min (was 20) — full-page matrix over 49 modules is ~4-6x the
    # wall-clock of the prior 13 element crops.
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
        with:
          # PAT is needed when update-baselines label is present so the push triggers a new CI run.
          # Default GITHUB_TOKEN pushes don't trigger workflows (GitHub's anti-loop protection).
          token: ${{ contains(github.event.pull_request.labels.*.name, 'update-baselines') && secrets.CI_PAT || github.token }}
          ref: ${{ github.head_ref || github.sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      # --- Dependency Caching ---
      - name: Cache vendor directory
        uses: actions/cache@v5
        with:
          path: ibl5/vendor
          key: ${{ runner.os }}-vendor-${{ hashFiles('ibl5/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-vendor-

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: ibl5/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('ibl5/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install JS dependencies
        working-directory: ibl5
        run: bun install

      - name: Install Composer dependencies
        working-directory: ibl5
        run: composer install --no-interaction --no-progress --prefer-dist --ignore-platform-reqs

      # --- Docker E2E Setup ---
      - uses: ./.github/actions/setup-docker-e2e
        with:
          build-css: 'true'
          with-playwright: 'true'
          test-user: ${{ secrets.IBL_TEST_USER || 'ci-e2e-user' }}
          test-pass: ${{ secrets.IBL_TEST_PASS || 'ci-e2e-pass-not-secret' }}
          test-user-regular: ${{ secrets.IBL_TEST_USER_REGULAR || 'ci-e2e-regular' }}
          test-pass-regular: ${{ secrets.IBL_TEST_PASS_REGULAR || 'e2e-regular-pass' }}

      # --- Run Tests ---
      # Visual regression runs in its own job — before functional E2E tests which modify
      # the database (trades, waivers, etc.) and would invalidate the baselines.
      - name: Run visual regression tests
        id: visual-regression
        continue-on-error: ${{ contains(github.event.pull_request.labels.*.name, 'update-baselines') }}
        env:
          IBL_TEST_USER: ${{ secrets.IBL_TEST_USER || 'ci-e2e-user' }}
          IBL_TEST_PASS: ${{ secrets.IBL_TEST_PASS || 'ci-e2e-pass-not-secret' }}
          IBL_TEST_USER_REGULAR: ${{ secrets.IBL_TEST_USER_REGULAR || 'ci-e2e-regular' }}
          IBL_TEST_PASS_REGULAR: ${{ secrets.IBL_TEST_PASS_REGULAR || 'e2e-regular-pass' }}
        run: |
          docker run --rm \
            --network ibl5-e2e \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}/ibl5:/ibl5" \
            -w /ibl5 \
            -e "BASE_URL=http://php/ibl5/" \
            -e "IBL_TEST_USER=$IBL_TEST_USER" \
            -e "IBL_TEST_PASS=$IBL_TEST_PASS" \
            -e "IBL_TEST_USER_REGULAR=$IBL_TEST_USER_REGULAR" \
            -e "IBL_TEST_PASS_REGULAR=$IBL_TEST_PASS_REGULAR" \
            -e "HOME=/tmp" \
            mcr.microsoft.com/playwright:v1.60.0-jammy \
            npx playwright test --config=playwright.visual.config.ts

      # --- Auto-update baselines when label is present ---
      - name: Regenerate visual regression baselines
        id: regen-baselines
        if: github.event_name == 'pull_request' && steps.visual-regression.outcome == 'failure' && contains(github.event.pull_request.labels.*.name, 'update-baselines')
        env:
          IBL_TEST_USER: ${{ secrets.IBL_TEST_USER || 'ci-e2e-user' }}
          IBL_TEST_PASS: ${{ secrets.IBL_TEST_PASS || 'ci-e2e-pass-not-secret' }}
          IBL_TEST_USER_REGULAR: ${{ secrets.IBL_TEST_USER_REGULAR || 'ci-e2e-regular' }}
          IBL_TEST_PASS_REGULAR: ${{ secrets.IBL_TEST_PASS_REGULAR || 'e2e-regular-pass' }}
        run: |
          docker run --rm \
            --network ibl5-e2e \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}/ibl5:/ibl5" \
            -w /ibl5 \
            -e "BASE_URL=http://php/ibl5/" \
            -e "IBL_TEST_USER=$IBL_TEST_USER" \
            -e "IBL_TEST_PASS=$IBL_TEST_PASS" \
            -e "IBL_TEST_USER_REGULAR=$IBL_TEST_USER_REGULAR" \
            -e "IBL_TEST_PASS_REGULAR=$IBL_TEST_PASS_REGULAR" \
            -e "HOME=/tmp" \
            mcr.microsoft.com/playwright:v1.60.0-jammy \
            npx playwright test --config=playwright.visual.config.ts --update-snapshots

      - name: Commit and push updated baselines
        if: always() && github.event_name == 'pull_request' && steps.visual-regression.outcome == 'failure' && contains(github.event.pull_request.labels.*.name, 'update-baselines')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ibl5/tests/e2e/smoke/visual-regression.spec.ts-snapshots/
          if git diff --cached --quiet; then
            echo "No baseline changes detected"
          else
            git commit -m "test: update visual regression baselines [auto]"
            git push
          fi

      - name: Remove update-baselines label
        if: always() && steps.regen-baselines.outcome != 'skipped' && github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'update-baselines')
        env:
          GH_TOKEN: ${{ secrets.CI_PAT }}
        run: gh pr edit ${{ github.event.pull_request.number }} --remove-label update-baselines

      - name: Upload visual regression report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: visual-regression-report
          path: ibl5/test-results/
          retention-days: 7

      - name: Upload visual regression JSON and screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: visual-regression-results
          path: |
            ibl5/test-results.json
            ibl5/test-results/
          retention-days: 1

      - name: Stop Docker containers
        if: always()
        run: docker compose -f docker-compose.ci.yml down

  api-e2e:
    name: API E2E Tests (Vitest)
    needs: [changes]
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache vendor directory
        uses: actions/cache@v5
        with:
          path: ibl5/vendor
          key: ${{ runner.os }}-vendor-${{ hashFiles('ibl5/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-vendor-

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: ibl5/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('ibl5/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install JS dependencies
        working-directory: ibl5
        run: bun install

      - name: Install Composer dependencies
        working-directory: ibl5
        run: composer install --no-interaction --no-progress --prefer-dist --ignore-platform-reqs

      # --- Docker E2E Setup ---
      - uses: ./.github/actions/setup-docker-e2e

      - name: Run API E2E tests
        working-directory: ibl5
        env:
          BASE_URL: http://localhost:8080/ibl5/
          IBL_API_KEY: e2e-test-key-do-not-use-in-production
        run: bun run test:api

      - name: Stop Docker containers
        if: always()
        run: docker compose -f docker-compose.ci.yml down

  e2e-shards:
    name: E2E Tests (shard ${{ matrix.shard-index }}/${{ matrix.total-shards }})
    needs: [changes]
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard-index: [1, 2, 3, 4]
        total-shards: [4]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      # --- Dependency Caching ---
      - name: Cache vendor directory
        uses: actions/cache@v5
        with:
          path: ibl5/vendor
          key: ${{ runner.os }}-vendor-${{ hashFiles('ibl5/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-vendor-

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: ibl5/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('ibl5/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install JS dependencies
        working-directory: ibl5
        run: bun install

      - name: Install Composer dependencies
        working-directory: ibl5
        run: composer install --no-interaction --no-progress --prefer-dist --ignore-platform-reqs

      # --- Docker E2E Setup ---
      - uses: ./.github/actions/setup-docker-e2e
        with:
          build-css: 'true'
          with-playwright: 'true'
          test-user: ${{ secrets.IBL_TEST_USER || 'ci-e2e-user' }}
          test-pass: ${{ secrets.IBL_TEST_PASS || 'ci-e2e-pass-not-secret' }}
          test-user-regular: ${{ secrets.IBL_TEST_USER_REGULAR || 'ci-e2e-regular' }}
          test-pass-regular: ${{ secrets.IBL_TEST_PASS_REGULAR || 'e2e-regular-pass' }}

      # --- Run Sharded Tests ---
      - name: Run E2E tests (shard ${{ matrix.shard-index }}/${{ matrix.total-shards }})
        env:
          IBL_TEST_USER: ${{ secrets.IBL_TEST_USER || 'ci-e2e-user' }}
          IBL_TEST_PASS: ${{ secrets.IBL_TEST_PASS || 'ci-e2e-pass-not-secret' }}
          IBL_TEST_USER_REGULAR: ${{ secrets.IBL_TEST_USER_REGULAR || 'ci-e2e-regular' }}
          IBL_TEST_PASS_REGULAR: ${{ secrets.IBL_TEST_PASS_REGULAR || 'e2e-regular-pass' }}
        run: |
          docker run --rm \
            --network ibl5-e2e \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}/ibl5:/ibl5" \
            -w /ibl5 \
            -e "BASE_URL=http://php/ibl5/" \
            -e "IBL_TEST_USER=$IBL_TEST_USER" \
            -e "IBL_TEST_PASS=$IBL_TEST_PASS" \
            -e "IBL_TEST_USER_REGULAR=$IBL_TEST_USER_REGULAR" \
            -e "IBL_TEST_PASS_REGULAR=$IBL_TEST_PASS_REGULAR" \
            -e "HOME=/tmp" \
            mcr.microsoft.com/playwright:v1.60.0-jammy \
            npx playwright test \
              --shard=${{ matrix.shard-index }}/${{ matrix.total-shards }} \
              --reporter=blob

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: blob-report-${{ matrix.shard-index }}
          path: ibl5/blob-report/
          retention-days: 1

      - name: Upload shard test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-shard-${{ matrix.shard-index }}
          path: ibl5/test-results/
          retention-days: 1

      - name: Dump PHP error log
        if: failure()
        run: |
          echo "=== PHP error log ==="
          docker compose -f docker-compose.ci.yml exec -T php cat /tmp/php_errors.log 2>/dev/null || echo "(no php_errors.log)"
          echo ""
          echo "=== Application log (last 30 lines) ==="
          docker compose -f docker-compose.ci.yml exec -T php sh -c 'tail -30 /var/www/html/ibl5/logs/*.log 2>/dev/null' || echo "(no app logs)"

      - name: Stop Docker containers
        if: always()
        run: docker compose -f docker-compose.ci.yml down

  ibl6-visual:
    name: IBL6 Visual Regression
    needs: [changes]
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ contains(github.event.pull_request.labels.*.name, 'update-baselines') && secrets.CI_PAT || github.token }}
          ref: ${{ github.head_ref || github.sha }}

      - uses: ./.github/actions/setup-docker-e2e

      - name: Wait for ibl6 healthy
        run: |
          deadline=$((SECONDS + 300))
          while ! docker compose -f docker-compose.ci.yml exec -T ibl6 wget -qO /dev/null http://localhost:3001/health 2>/dev/null; do
            if [ $SECONDS -ge $deadline ]; then
              echo "::error::ibl6 container not healthy after 5 min"
              docker compose -f docker-compose.ci.yml logs ibl6
              exit 1
            fi
            sleep 3
          done
          echo "ibl6 is healthy"

      - name: Pull Playwright image
        run: docker pull mcr.microsoft.com/playwright:v1.60.0-jammy

      - name: Install IBL6 dependencies
        working-directory: IBL6
        run: npm ci

      - name: Run IBL6 visual regression tests
        id: ibl6-visual-regression
        continue-on-error: ${{ contains(github.event.pull_request.labels.*.name, 'update-baselines') }}
        run: |
          docker run --rm \
            --network ibl5-e2e \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}/IBL6:/IBL6" \
            -w /IBL6 \
            -e "BASE_URL=http://ibl6:3001" \
            -e "HOME=/tmp" \
            mcr.microsoft.com/playwright:v1.60.0-jammy \
            npx playwright test --config=playwright.visual.config.ts

      - name: Regenerate IBL6 visual regression baselines
        id: ibl6-regen-baselines
        if: github.event_name == 'pull_request' && steps.ibl6-visual-regression.outcome == 'failure' && contains(github.event.pull_request.labels.*.name, 'update-baselines')
        run: |
          docker run --rm \
            --network ibl5-e2e \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}/IBL6:/IBL6" \
            -w /IBL6 \
            -e "BASE_URL=http://ibl6:3001" \
            -e "HOME=/tmp" \
            mcr.microsoft.com/playwright:v1.60.0-jammy \
            npx playwright test --config=playwright.visual.config.ts --update-snapshots

      - name: Commit and push updated IBL6 baselines
        if: always() && github.event_name == 'pull_request' && steps.ibl6-visual-regression.outcome == 'failure' && contains(github.event.pull_request.labels.*.name, 'update-baselines')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add IBL6/e2e/boxscore.visual.spec.ts-snapshots/
          if git diff --cached --quiet; then
            echo "No baseline changes detected"
          else
            git commit -m "test: update IBL6 visual regression baselines [auto]"
            git push
          fi

      - name: Remove update-baselines label
        if: always() && steps.ibl6-regen-baselines.outcome != 'skipped' && github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'update-baselines')
        env:
          GH_TOKEN: ${{ secrets.CI_PAT }}
        run: gh pr edit ${{ github.event.pull_request.number }} --remove-label update-baselines

      - name: Upload IBL6 visual regression report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ibl6-visual-regression-report
          path: IBL6/test-results/
          retention-days: 7

      - name: Stop Docker containers
        if: always()
        run: docker compose -f docker-compose.ci.yml down

  ibl6-e2e:
    name: IBL6 E2E Tests
    needs: [changes]
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-docker-e2e

      - name: Wait for ibl6 healthy
        run: |
          deadline=$((SECONDS + 300))
          while ! docker compose -f docker-compose.ci.yml exec -T ibl6 wget -qO /dev/null http://localhost:3001/health 2>/dev/null; do
            if [ $SECONDS -ge $deadline ]; then
              echo "::error::ibl6 container not healthy after 5 min"
              docker compose -f docker-compose.ci.yml logs ibl6
              exit 1
            fi
            sleep 3
          done
          echo "ibl6 is healthy"

      - name: Pull Playwright image
        run: docker pull mcr.microsoft.com/playwright:v1.60.0-jammy

      - name: Install IBL6 dependencies
        working-directory: IBL6
        run: npm ci

      - name: Run IBL6 E2E tests
        run: |
          docker run --rm \
            --network ibl5-e2e \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}/IBL6:/IBL6" \
            -w /IBL6 \
            -e "BASE_URL=http://ibl6:3001" \
            -e "HOME=/tmp" \
            mcr.microsoft.com/playwright:v1.60.0-jammy \
            npx playwright test

      - name: Upload IBL6 E2E report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ibl6-e2e-report
          path: IBL6/test-results/
          retention-days: 7

      - name: Stop Docker containers
        if: always()
        run: docker compose -f docker-compose.ci.yml down

  merge-reports:
    name: Merge E2E Reports
    needs: [changes, e2e, e2e-shards, api-e2e, ibl6-visual, ibl6-e2e]
    if: always() && needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install JS dependencies
        working-directory: ibl5
        run: bun install

      - name: Download blob reports
        uses: actions/download-artifact@v8
        with:
          pattern: blob-report-*
          path: ibl5/all-blob-reports
          merge-multiple: true

      - name: Download visual regression results
        if: always()
        uses: actions/download-artifact@v8
        with:
          name: visual-regression-results
          path: ibl5/visual-results/
        continue-on-error: true

      - name: Download shard test results
        if: always()
        uses: actions/download-artifact@v8
        with:
          pattern: test-results-shard-*
          path: ibl5/shard-test-results/
          merge-multiple: true
        continue-on-error: true

      - name: Merge reports
        working-directory: ibl5
        run: |
          npx playwright merge-reports --reporter=html ./all-blob-reports
          npx playwright merge-reports --reporter=json ./all-blob-reports > test-results.json

      - name: Upload merged report
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: ibl5/playwright-report/
          retention-days: 7

      - name: Restore CML cache
        if: always() && github.event_name == 'pull_request'
        uses: actions/cache@v5
        with:
          path: ~/.cml
          key: ${{ runner.os }}-cml-0.20.6

      - name: Install CML (fallback if cache miss)
        if: always() && github.event_name == 'pull_request'
        run: |
          if [ ! -f ~/.cml/node_modules/.bin/cml ]; then
            npm install --prefix ~/.cml @dvcorg/cml@0.20.6
          fi
          echo "$HOME/.cml/node_modules/.bin" >> $GITHUB_PATH

      - name: Generate E2E report with screenshots
        if: always() && github.event_name == 'pull_request'
        working-directory: ibl5
        run: |
          node ../.github/scripts/summarize-e2e-results.mjs \
            --visual=visual-results/test-results.json \
            --visual-screenshots=visual-results/test-results/ \
            --functional=test-results.json \
            --functional-screenshots=shard-test-results/ \
            --artifact-url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            > /tmp/e2e-comment.md

      - name: Post E2E results to PR
        if: always() && github.event_name == 'pull_request'
        working-directory: ibl5
        env:
          REPO_TOKEN: ${{ github.token }}
        run: cml comment update --target=pr --publish /tmp/e2e-comment.md

  gate:
    name: E2E Tests
    if: always()
    needs: [changes, e2e, api-e2e, e2e-shards, ibl6-visual, ibl6-e2e]
    runs-on: ubuntu-latest
    steps:
      - run: exit 1
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
