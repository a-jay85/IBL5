name: Lighthouse Baseline

on:
  push:
    branches: [master]
    paths:
      - '**.php'
      - '**.css'
      - '**.ts'
      - '**.js'
      - 'ibl5/design/**'
      - 'ibl5/migrations/**.sql'
      - 'Dockerfile'
      - 'docker-compose*.yml'
      - 'ibl5/.lighthouserc.json'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  baseline:
    name: Generate baseline
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/lighthouse-setup

      - name: Run Lighthouse
        working-directory: ibl5
        run: |
          jq --argjson urls "$(../bin/lighthouse-audit-urls --json --base-url=http://localhost:8080)" \
             '.ci.collect.url = $urls | .ci.collect.numberOfRuns = 1' .lighthouserc.json > /tmp/lhrc.baseline.json
          bunx @lhci/cli collect --config=/tmp/lhrc.baseline.json
        env:
          CHROME_PATH: /usr/bin/google-chrome-stable

      # autorun's upload step uses temporary-public-storage (writes links.json
      # only). The baseline artifact needs manifest.json — emit it via a
      # second filesystem upload from the same collected lhr-*.json files.
      - name: Write manifest.json for baseline artifact
        working-directory: ibl5
        run: |
          bunx @lhci/cli upload --target=filesystem --outputDir=.lighthouseci
          # lhci writes one entry per run (3 per URL); the formatter expects
          # one entry per URL — filter to representative runs.
          jq '[.[] | select(.isRepresentativeRun == true)]' \
            .lighthouseci/manifest.json > .lighthouseci/manifest.tmp.json
          mv .lighthouseci/manifest.tmp.json .lighthouseci/manifest.json

      - name: Upload baseline manifest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lighthouse-baseline-manifest
          path: |
            ibl5/.lighthouseci/manifest.json
          retention-days: 30

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.ci.yml down --volumes
