name: Deploy Rehearsal

on:
  pull_request:
    branches: [master]
    paths:
      - 'ibl5/migrations/**.sql'
      - 'ibl5/composer.json'
      - 'ibl5/composer.lock'
      - 'ibl5/bin/migrate'
      - 'ibl5/bin/validate-schema'
      - 'ibl5/config/schema-assertions.php'
      - 'ibl5/classes/Migration/**'
      - '.github/workflows/deploy-rehearsal.yml'
      - '.github/workflows/main.yml'
  push:
    branches: [master]
    paths:
      - 'ibl5/migrations/**.sql'
      - 'ibl5/composer.json'
      - 'ibl5/composer.lock'
      - 'ibl5/bin/migrate'
      - 'ibl5/bin/validate-schema'
      - 'ibl5/config/schema-assertions.php'
      - 'ibl5/classes/Migration/**'
      - '.github/workflows/deploy-rehearsal.yml'
      - '.github/workflows/main.yml'
  workflow_call: {}
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rehearse:
    name: Deploy Rehearsal (composer --no-dev + migrate + validate-schema)
    runs-on: ubuntu-latest

    env:
      DB_HOST: 127.0.0.1
      DB_USER: root
      DB_PASS: root
      DB_NAME: iblhoops_ibl5

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: iblhoops_ibl5
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, intl, mysqli
          coverage: none

      # Mirror main.yml "Install PHP dependencies" exactly (--no-dev catches
      # dev-dependency leaks that tests.yml's full install would miss)
      - name: composer install --no-dev (mirrors main.yml)
        working-directory: ibl5
        run: composer install --no-dev --no-interaction --optimize-autoloader

      # config.php.example reads DB creds from getenv() with fallbacks; the
      # job-level DB_* env vars point it at the CI MariaDB service.
      - name: Configure ibl5 to point at CI MariaDB
        working-directory: ibl5
        run: cp config.php.example config.php

      - name: Apply baseline schema
        working-directory: ibl5
        run: |
          sed 's/DEFINER=`[^`]*`@`[^`]*`//g' migrations/000_baseline_schema.sql \
            | mysql -h 127.0.0.1 -u root -proot iblhoops_ibl5

      - name: Mark baseline as applied in migration tracker
        run: |
          mysql -h 127.0.0.1 -u root -proot iblhoops_ibl5 -e "
            CREATE TABLE IF NOT EXISTS migrations (
              id INT AUTO_INCREMENT PRIMARY KEY,
              migration VARCHAR(255) NOT NULL,
              batch INT NOT NULL
            );
            INSERT INTO migrations (migration, batch) VALUES ('000_baseline_schema.sql', 0);
          "

      # Mirror main.yml "Run database migrations" exactly
      - name: php bin/migrate (mirrors main.yml)
        run: php ibl5/bin/migrate

      # Mirror main.yml "Validate database schema" exactly — this is the gate
      - name: php bin/validate-schema (mirrors main.yml; pre-flight gate)
        run: php ibl5/bin/validate-schema

      - name: Seed rehearsal database with smoke fixtures
        run: mysql -h 127.0.0.1 -u root -proot iblhoops_ibl5 < ibl5/tests/DatabaseIntegration/Fixtures/db-seed.sql

      - name: Start PHP built-in server for rehearsal smoke probe
        id: server
        run: |
          php -S 127.0.0.1:8080 -t . > /tmp/php-server.log 2>&1 &
          echo "pid=$!" >> "$GITHUB_OUTPUT"
          for i in $(seq 1 20); do
            nc -z 127.0.0.1 8080 && exit 0
            sleep 0.5
          done
          echo "::error::PHP built-in server did not start within 10s"
          cat /tmp/php-server.log
          exit 1

      - name: Run IBL5 smoke checks against rehearsal server
        env:
          SMOKE_REHEARSAL_MODE: "1"
          SMOKE_INTERCHECK_DELAY: "0"
          SMOKE_RETRY_DELAY: "2"
        run: |
          chmod +x bin/smoke-prod
          bin/smoke-prod --scope=ibl5 http://127.0.0.1:8080

      - name: Tear down PHP built-in server
        if: always()
        run: |
          kill ${{ steps.server.outputs.pid }} 2>/dev/null || true
          [ -f /tmp/php-server.log ] && tail -50 /tmp/php-server.log || true
