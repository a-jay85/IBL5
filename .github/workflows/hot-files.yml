name: Hot File Check

on:
  pull_request:
    branches: [ master ]
    types: [opened, synchronize, reopened]
    paths:
      - 'ibl5/classes/**'
      - 'bin/check-hot-files'
      - '.github/workflows/hot-files.yml'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hot-files:
    name: Check hot files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run bin/check-hot-files
        run: bin/check-hot-files --pr | tee hot-files.txt
        continue-on-error: true

      - name: Post hot-file comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: hot-files
          path: hot-files.txt
