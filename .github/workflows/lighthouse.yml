name: Lighthouse CI

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      src: ${{ github.event.pull_request.user.login == 'dependabot[bot]' || steps.filter.outputs.src == 'true' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Compute website-affecting
        id: filter
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          CHANGED=$(git diff --name-only "$BASE"...HEAD)
          if [ -z "$CHANGED" ]; then
            echo "src=true" >> "$GITHUB_OUTPUT"
          elif printf '%s\n' "$CHANGED" | bin/website-affecting; then
            echo "src=true" >> "$GITHUB_OUTPUT"
          else
            echo "src=false" >> "$GITHUB_OUTPUT"
          fi

  lighthouse:
    name: Performance Audit
    needs: [changes]
    if: |
      always() &&
      needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/lighthouse-setup

      # --- Lighthouse ---
      - name: Run Lighthouse CI
        working-directory: ibl5
        run: |
          jq --argjson urls "$(../bin/lighthouse-pr-urls --json --base-url=http://localhost:8080)" \
             '.ci.collect.url = $urls' .lighthouserc.json > /tmp/lhrc.pr.json
          bunx @lhci/cli autorun --config=/tmp/lhrc.pr.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
          CHROME_PATH: /usr/bin/google-chrome-stable

      # autorun's upload step uses temporary-public-storage (writes links.json
      # only). The comment formatter also needs manifest.json — emit it via a
      # second filesystem upload from the same collected lhr-*.json files.
      - name: Write manifest.json for comment formatter
        working-directory: ibl5
        run: |
          bunx @lhci/cli upload --target=filesystem --outputDir=.lighthouseci
          # lhci writes one entry per run (3 per URL); the formatter expects
          # one entry per URL — filter to representative runs.
          jq '[.[] | select(.isRepresentativeRun == true)]' \
            .lighthouseci/manifest.json > .lighthouseci/manifest.tmp.json
          mv .lighthouseci/manifest.tmp.json .lighthouseci/manifest.json

      - name: Download master baseline
        id: baseline
        if: always()
        uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
        continue-on-error: true
        with:
          workflow: lighthouse-baseline.yml
          branch: master
          name: lighthouse-baseline-manifest
          path: ibl5/baseline/
          if_no_artifact_found: warn

      - name: Generate PR comment
        id: comment
        if: always()
        working-directory: ibl5
        run: |
          BASELINE_FLAG=""
          if [[ -f baseline/manifest.json ]]; then
            BASELINE_FLAG="--baseline=baseline/manifest.json"
          fi
          ../bin/lighthouse-comment \
            --manifest=.lighthouseci/manifest.json \
            --links=.lighthouseci/links.json \
            $BASELINE_FLAG \
            --out=.lighthouseci/comment.md || true

      - name: Post sticky PR comment
        if: always() && github.event_name == 'pull_request' && hashFiles('ibl5/.lighthouseci/comment.md') != ''
        uses: marocchino/sticky-pull-request-comment@5770ad5eb8f42dd2c4f34da00c94c5381e49af88 # v3.0.5
        with:
          header: lighthouse-comment
          path: ibl5/.lighthouseci/comment.md

      # --- Cleanup ---
      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.ci.yml down --volumes
