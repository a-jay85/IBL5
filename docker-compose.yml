services:
  traefik:
    image: traefik:v3.6
    container_name: ibl5-traefik
    restart: unless-stopped
    environment:
      DOCKER_API_VERSION: "1.44"
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=ibl5-proxy
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
      - "8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - ibl5-proxy

  mariadb:
    image: mariadb:10.6
    container_name: ibl5-mariadb
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: iblhoops_ibl5
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASS}
    volumes:
      - ibl5-mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - default
      - ibl5-proxy

  php:
    build: .
    container_name: ibl5-php
    restart: unless-stopped
    environment:
      DB_HOST: mariadb
      MAIL_TRANSPORT: smtp
      MAIL_SMTP_HOST: mailpit
      MAIL_SMTP_PORT: 1025
      MAIL_SMTP_ENCRYPTION: ""
    volumes:
      - ./ibl5:/var/www/html/ibl5
    depends_on:
      mariadb:
        condition: service_healthy
      mailpit:
        condition: service_started
    labels:
      - traefik.enable=true
      - traefik.http.routers.main.rule=Host(`main.localhost`)
      - traefik.http.services.main.loadbalancer.server.port=80
    networks:
      - default
      - ibl5-proxy

  mailpit:
    image: axllent/mailpit:latest
    container_name: ibl5-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    labels:
      - traefik.enable=true
      - traefik.http.routers.mailpit.rule=Host(`mailpit.localhost`)
      - traefik.http.services.mailpit.loadbalancer.server.port=8025
    networks:
      - default
      - ibl5-proxy

  adminer:
    image: adminer:latest
    container_name: ibl5-adminer
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: mariadb
    depends_on:
      - mariadb
    labels:
      - traefik.enable=true
      - traefik.http.routers.adminer.rule=Host(`adminer.localhost`)
      - traefik.http.services.adminer.loadbalancer.server.port=8080
    networks:
      - default
      - ibl5-proxy

volumes:
  ibl5-mariadb-data:

networks:
  ibl5-proxy:
    external: true
