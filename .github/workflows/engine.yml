name: Engine

on:
  push:
    branches: [ master, develop ]
    paths:
      - 'engine/**'
      - '.github/workflows/engine.yml'
  pull_request:
    branches: [ master, develop ]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      engine: ${{ github.event_name == 'push' || github.event.pull_request.user.login == 'dependabot[bot]' || steps.filter.outputs.engine == 'true' }}
    steps:
      - uses: dorny/paths-filter@v4
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: |
            engine:
              - 'engine/**'
              - '.github/workflows/engine.yml'

  engine:
    name: Go build, vet, lint, test
    needs: [changes]
    if: needs.changes.outputs.engine == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: engine/go.mod

      - name: Build
        working-directory: engine
        run: go build ./...

      # Fail if any Go file is not gofmt-formatted. Code is currently clean.
      - name: Gofmt check
        working-directory: engine
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        working-directory: engine
        run: go vet ./...

      # Pinned version = deterministic gate (same philosophy as the go.mod
      # toolchain pin). Bump deliberately; never float to latest.
      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: engine

      # Run tests with coverage and enforce a floor. The floor is a ratchet:
      # current total is 95.3%; raise this as coverage improves, never lower it.
      # Kept in sync with COVER_MIN in engine/Makefile.
      - name: Test with coverage floor
        working-directory: engine
        env:
          COVER_MIN: "90.0"
        run: |
          go test -coverprofile=cover.out ./...
          total="$(go tool cover -func=cover.out | awk '/^total:/ {gsub(/%/, "", $3); print $3}')"
          echo "total coverage: $total% (floor: $COVER_MIN%)"
          if awk "BEGIN { exit !($total < $COVER_MIN) }"; then
            echo "coverage $total% is below floor $COVER_MIN%"
            exit 1
          fi

  gate:
    name: Engine
    if: always()
    needs: [changes, engine]
    runs-on: ubuntu-latest
    steps:
      - run: exit 1
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
