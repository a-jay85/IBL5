name: E2E Tests

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, ready_for_review, labeled]
  push:
    branches: [master]
    paths:
      - '**.php'
      - '**.ts'
      - '**.js'
      - '**.css'
      - 'ibl5/design/**'
      - 'ibl5/migrations/**.sql'
      - 'Dockerfile'
      - 'docker-compose*.yml'
      - 'docker/**'
      - 'ibl5/tests/e2e/**'
      - 'IBL6/**'
      - 'docker/Dockerfile.ibl6'
      - '.github/workflows/e2e-tests.yml'
      - '.github/actions/setup-docker-e2e/**'
      - '.github/scripts/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      # NOTE: a `labeled` event intentionally does NOT set src=true. Adding any
      # label used to force the full E2E suite (api-e2e/shards/mutators) to rerun.
      # Only the Visual Regression job should respond to a label — see `baseline` below.
      src: ${{ github.event_name == 'push' || github.event.pull_request.user.login == 'dependabot[bot]' || steps.filter.outputs.src == 'true' }}
      # True only for the `update-baselines` label. Gates the Visual Regression job
      # alone so applying that label reruns baseline regen without a CI storm.
      baseline: ${{ github.event.action == 'labeled' && github.event.label.name == 'update-baselines' }}
      # True when a change touches IBL6 or the SHARED docker/e2e infra the IBL6 jobs
      # run inside. Gates ibl6-visual/ibl6-e2e so a pure-ibl5 PR skips them (saving 2
      # concurrent runner slots) while an IBL6 or shared-infra PR still runs them.
      ibl6: ${{ github.event_name == 'push' || github.event.pull_request.user.login == 'dependabot[bot]' || steps.ibl6filter.outputs.ibl6 == 'true' }}
      # True when a PR touches a runtime-affecting dep — the same 7-entry set that
      # cache-dependencies.yml rebuilds `:latest` from (kept in sync; see Phase 5).
      # Consumed by setup-docker-e2e (Phase 2): when true the six e2e jobs build the
      # PHP image from the PR's Dockerfile/deps instead of pulling the stale `:latest`.
      # NOTE the deliberate absence of the `push || dependabot` disjunction that `src`
      # and `ibl6` carry: on a `push` event the runtimefilter step below is SKIPPED
      # (pull_request-only guard) → this output is empty → falsy → jobs pull `:latest`
      # (status quo; cache-dependencies already rebuilt it on that push). A dependabot
      # runtime PR is a normal pull_request event, so the filter detects it with no
      # special-case. Both fall-throughs are intended.
      runtime: ${{ steps.runtimefilter.outputs.runtime == 'true' }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        if: github.event_name == 'pull_request' && github.event.action != 'labeled'
        with:
          fetch-depth: 0
      # Change-detection strategy: bin/website-affecting (domain gate), NOT a
      # static glob. The `src` output must answer "does this diff affect app
      # rendering?" — a question encoded as a deny-regex + carve-outs + a
      # CI-meta-exempt list that no dorny glob can replicate. A static glob would
      # both over-trigger (CI-meta edits) and under-trigger (a rendered file the
      # glob forgot). The ibl6 and runtime sub-filters below use dorny instead,
      # because those ARE artifact/tool-scoped (IBL6 image, PHP app image).
      - name: Compute website-affecting
        id: filter
        if: github.event_name == 'pull_request' && github.event.action != 'labeled'
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          CHANGED=$(git diff --name-only "$BASE"...HEAD)
          if [ -z "$CHANGED" ]; then
            echo "src=true" >> "$GITHUB_OUTPUT"
          elif printf '%s\n' "$CHANGED" | bin/website-affecting; then
            echo "src=true" >> "$GITHUB_OUTPUT"
          else
            echo "src=false" >> "$GITHUB_OUTPUT"
          fi

      # Change-detection strategy (ibl6 + runtime below): dorny/paths-filter with
      # static globs. These are artifact-scoped, not rendering-scoped — run ibl6
      # e2e only when the IBL6 app/image/shared-DB inputs change; rebuild the PHP
      # app image only when its Docker/deps inputs change. website-affecting
      # is the wrong tool here (it models PHP rendering impact, not build inputs).
      - name: Detect IBL6-affecting changes
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: ibl6filter
        if: github.event_name == 'pull_request' && github.event.action != 'labeled'
        with:
          filters: |
            ibl6:
              - 'IBL6/**'
              - 'docker/Dockerfile.ibl6'
              - 'docker-compose.ci.yml'
              - '.github/actions/setup-docker-e2e/**'
              - '.github/workflows/e2e-tests.yml'
              # ibl6 connects to the SAME shared mariadb/ibl5 DB that
              # setup-docker-e2e migrates and seeds; ibl6-visual asserts against
              # seed-driven box-score snapshots. A migration/seed/runner-only PR
              # must still run ibl6-e2e/ibl6-visual or a DB-driven regression
              # would skip past the gate.
              - 'ibl5/migrations/**'
              - 'ibl5/tests/e2e/fixtures/ci-seed.sql'
              - 'ibl5/bin/run-migrations-ci.sh'

      - name: Detect runtime-affecting changes
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: runtimefilter
        # Unlike ibl6filter, this fires on ALL pull_request events INCLUDING `labeled`
        # — do NOT copy ibl6filter's `&& github.event.action != 'labeled'` guard. A
        # runtime PR that gets the `update-baselines` label fires a `labeled` event; if
        # we skipped on it, `runtime` would default false and VR baselines would
        # regenerate against the stale `:latest` instead of the PR's freshly-built
        # image. The head SHA is unchanged on a label event, so the base…head diff —
        # and thus the filter result — is identical to the prior synchronize; firing on
        # labeled is safe and correct. dorny/paths-filter needs NO checkout for
        # pull_request events (it diffs base…head via the GitHub compare API, which the
        # job's existing `pull-requests: read` permission authorizes) — this matters
        # because the `changes` job's checkout step is itself skipped on `labeled`.
        if: github.event_name == 'pull_request'
        with:
          filters: |
            runtime:
              # Keep in sync with cache-dependencies.yml `push: paths` (lines 17-23) —
              # the 7-entry set that rebuilds php-apache:latest. If these two lists
              # drift, a runtime-affecting PR may test against a stale image (the exact
              # gap this feature closes), or over-build. Update BOTH together.
              - 'ibl5/composer.json'
              - 'ibl5/composer.lock'
              - 'ibl5/bun.lock'
              - 'ibl5/package.json'
              - 'Dockerfile'
              - 'docker/opcache.ini'
              - 'docker/entrypoint.sh'

  playwright-version-drift:
    name: Playwright version drift guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Verify Playwright image tag is derived, never hardcoded
        run: bin/check-playwright-pinning

  e2e:
    name: Visual Regression
    needs: [changes]
    if: needs.changes.outputs.src == 'true' || needs.changes.outputs.baseline == 'true'
    runs-on: ubuntu-latest
    # 30 min (was 20) — full-page matrix over 49 modules is ~4-6x the
    # wall-clock of the prior 13 element crops.
    timeout-minutes: 30
    # contents: write → push the Playwright HTML report to the gh-pages branch.
    # pull-requests: write → post the sticky visual-review comment.
    # (Job-level scope: only this job gets write; the top-level default stays read.)
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # PAT is needed when update-baselines label is present so the push triggers a new CI run.
          # Default GITHUB_TOKEN pushes don't trigger workflows (GitHub's anti-loop protection).
          token: ${{ contains(github.event.pull_request.labels.*.name, 'update-baselines') && secrets.CI_PAT || github.token }}
          ref: ${{ github.head_ref || github.sha }}
          # Full history so `git diff <base>...HEAD` (changed-file coverage) resolves the base SHA.
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      # --- Dependency Caching ---
      - name: Cache vendor directory
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: vendor-cache
        with:
          path: ibl5/vendor
          key: ${{ runner.os }}-vendor-${{ hashFiles('ibl5/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-vendor-

      - name: Cache node_modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: node-modules-cache
        with:
          path: ibl5/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('ibl5/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install JS dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        working-directory: ibl5
        run: bun install

      - name: Install Composer dependencies
        if: steps.vendor-cache.outputs.cache-hit != 'true'
        working-directory: ibl5
        run: composer install --no-interaction --no-progress --prefer-dist --ignore-platform-reqs

      # --- Docker E2E Setup ---
      - uses: ./.github/actions/setup-docker-e2e
        with:
          php-image: ${{ needs.changes.outputs.runtime == 'true' && 'build' || 'pull' }}
          build-css: 'true'
          with-playwright: 'true'
          test-user: ${{ secrets.IBL_TEST_USER || 'ci-e2e-user' }}
          test-pass: ${{ secrets.IBL_TEST_PASS || 'ci-e2e-pass-not-secret' }}
          test-user-regular: ${{ secrets.IBL_TEST_USER_REGULAR || 'ci-e2e-regular' }}
          test-pass-regular: ${{ secrets.IBL_TEST_PASS_REGULAR || 'e2e-regular-pass' }}

      # --- Run Tests ---
      # Visual regression runs in its own job — before functional E2E tests which modify
      # the database (trades, waivers, etc.) and would invalidate the baselines.
      - name: Run visual regression tests
        id: visual-regression
        continue-on-error: ${{ contains(github.event.pull_request.labels.*.name, 'update-baselines') }}
        env:
          IBL_TEST_USER: ${{ secrets.IBL_TEST_USER || 'ci-e2e-user' }}
          IBL_TEST_PASS: ${{ secrets.IBL_TEST_PASS || 'ci-e2e-pass-not-secret' }}
          IBL_TEST_USER_REGULAR: ${{ secrets.IBL_TEST_USER_REGULAR || 'ci-e2e-regular' }}
          IBL_TEST_PASS_REGULAR: ${{ secrets.IBL_TEST_PASS_REGULAR || 'e2e-regular-pass' }}
        run: |
          docker run --rm \
            --network ibl5-e2e \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}/ibl5:/ibl5" \
            -w /ibl5 \
            -e "BASE_URL=http://php/ibl5/" \
            -e "IBL_TEST_USER=$IBL_TEST_USER" \
            -e "IBL_TEST_PASS=$IBL_TEST_PASS" \
            -e "IBL_TEST_USER_REGULAR=$IBL_TEST_USER_REGULAR" \
            -e "IBL_TEST_PASS_REGULAR=$IBL_TEST_PASS_REGULAR" \
            -e "HOME=/tmp" \
            "$PW_IMAGE" \
            npx playwright test --config=playwright.visual.config.ts

      # --- Visual-review publishing (change-driven, every PR run) ---
      # Fires on pass OR fail (the gallery's "before" is `git show base.sha:<snapshot>`,
      # which is immune to an in-branch baseline regen, so a green-but-changed PR still
      # surfaces). Skipped only during baseline regen (update-baselines label).
      # Ordering invariant: coverage → build-gallery → deploy-gallery → build-comment →
      # post-comment, all BEFORE the regen step below. The "before" is regen-immune, but
      # the actuals/gallery must exist before the deploy.
      # Fork PRs receive a read-only token with no secrets, so these steps no-op there.
      - name: Compute VR coverage from changed files
        id: vr-coverage
        if: always() && github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'update-baselines')
        run: |
          git diff --name-only "${{ github.event.pull_request.base.sha }}"...HEAD \
            | bin/vr-changed-coverage > coverage.json
          cat coverage.json

      - name: Build VR gallery
        if: always() && github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'update-baselines')
        run: |
          bin/vr-build-gallery \
            --actuals=ibl5/vr-actuals \
            --base-sha=${{ github.event.pull_request.base.sha }} \
            --out-dir=ibl5/vr-gallery \
            --gallery-json=ibl5/vr-gallery.json
          cat ibl5/vr-gallery.json

      - name: Copy new-screen renders into gallery deploy tree
        if: always() && github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'update-baselines')
        continue-on-error: true
        run: |
          bin/vr-review-comment \
            --gallery=ibl5/vr-gallery.json \
            --copy-new-screens=ibl5/vr-gallery/new-screens

      - name: Deploy VR gallery to per-SHA GitHub Pages
        id: vr-pages
        if: always() && github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'update-baselines')
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # The change-driven gallery; the Playwright report is preserved under
          # <sha>/visual-review/playwright-report/ (copied in by bin/vr-build-gallery).
          publish_dir: ibl5/vr-gallery
          # One subdirectory per commit SHA so multiple open PRs/SHAs coexist.
          destination_dir: ${{ github.sha }}/visual-review
          keep_files: true

      - name: Build visual-review comment
        if: always() && github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'update-baselines')
        run: |
          bin/vr-review-comment \
            --gallery=ibl5/vr-gallery.json \
            --coverage=coverage.json \
            --pages-url=https://a-jay85.github.io/IBL5/${{ github.sha }}/visual-review/ \
            --out=vr-review-comment.md
          cat vr-review-comment.md

      - name: Post sticky visual-review comment
        if: always() && github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'update-baselines')
        uses: marocchino/sticky-pull-request-comment@5770ad5eb8f42dd2c4f34da00c94c5381e49af88 # v3.0.5
        with:
          header: visual-review
          path: vr-review-comment.md

      - name: Splice new-screen images into PR body
        if: always() && github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'update-baselines')
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bin/vr-review-comment \
            --gallery=ibl5/vr-gallery.json \
            --pages-url=https://a-jay85.github.io/IBL5/${{ github.sha }}/visual-review/ \
            --update-pr-body=${{ github.event.pull_request.number }}

      # --- Auto-update baselines when label is present ---
      - name: Regenerate visual regression baselines
        id: regen-baselines
        if: github.event_name == 'pull_request' && steps.visual-regression.outcome == 'failure' && contains(github.event.pull_request.labels.*.name, 'update-baselines')
        env:
          IBL_TEST_USER: ${{ secrets.IBL_TEST_USER || 'ci-e2e-user' }}
          IBL_TEST_PASS: ${{ secrets.IBL_TEST_PASS || 'ci-e2e-pass-not-secret' }}
          IBL_TEST_USER_REGULAR: ${{ secrets.IBL_TEST_USER_REGULAR || 'ci-e2e-regular' }}
          IBL_TEST_PASS_REGULAR: ${{ secrets.IBL_TEST_PASS_REGULAR || 'e2e-regular-pass' }}
        run: |
          docker run --rm \
            --network ibl5-e2e \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}/ibl5:/ibl5" \
            -w /ibl5 \
            -e "BASE_URL=http://php/ibl5/" \
            -e "IBL_TEST_USER=$IBL_TEST_USER" \
            -e "IBL_TEST_PASS=$IBL_TEST_PASS" \
            -e "IBL_TEST_USER_REGULAR=$IBL_TEST_USER_REGULAR" \
            -e "IBL_TEST_PASS_REGULAR=$IBL_TEST_PASS_REGULAR" \
            -e "HOME=/tmp" \
            "$PW_IMAGE" \
            npx playwright test --config=playwright.visual.config.ts --update-snapshots

      - name: Commit and push updated baselines
        if: always() && github.event_name == 'pull_request' && steps.visual-regression.outcome == 'failure' && contains(github.event.pull_request.labels.*.name, 'update-baselines')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ibl5/tests/e2e/smoke/visual-regression.spec.ts-snapshots/
          if git diff --cached --quiet; then
            echo "No baseline changes detected"
          else
            git commit -m "test: update visual regression baselines [auto]"
            git push
          fi

      - name: Remove update-baselines label
        if: always() && steps.regen-baselines.outcome != 'skipped' && github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'update-baselines')
        env:
          GH_TOKEN: ${{ secrets.CI_PAT }}
        run: gh pr edit ${{ github.event.pull_request.number }} --remove-label update-baselines

      - name: Upload visual regression report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: visual-regression-report
          path: ibl5/test-results/
          retention-days: 7

      - name: Upload visual regression JSON and screenshots
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: visual-regression-results
          path: |
            ibl5/test-results.json
            ibl5/test-results/
          retention-days: 1

      - name: Stop Docker containers
        if: always()
        run: docker compose -f docker-compose.ci.yml down

  api-e2e:
    name: API E2E Tests (Vitest)
    needs: [changes]
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Cache vendor directory
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: vendor-cache
        with:
          path: ibl5/vendor
          key: ${{ runner.os }}-vendor-${{ hashFiles('ibl5/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-vendor-

      - name: Cache node_modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: node-modules-cache
        with:
          path: ibl5/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('ibl5/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install JS dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        working-directory: ibl5
        run: bun install

      - name: Install Composer dependencies
        if: steps.vendor-cache.outputs.cache-hit != 'true'
        working-directory: ibl5
        run: composer install --no-interaction --no-progress --prefer-dist --ignore-platform-reqs

      # --- Docker E2E Setup ---
      - uses: ./.github/actions/setup-docker-e2e
        with:
          php-image: ${{ needs.changes.outputs.runtime == 'true' && 'build' || 'pull' }}

      - name: Run API E2E tests
        working-directory: ibl5
        env:
          BASE_URL: http://localhost:8080/ibl5/
          IBL_API_KEY: e2e-test-key-do-not-use-in-production
        run: bun run test:api

      - name: Stop Docker containers
        if: always()
        run: docker compose -f docker-compose.ci.yml down

  e2e-shards:
    # Name interpolates the matrix context so GitHub omits its auto-appended
    # "(1, 1)" suffix; the suffix only reappears (as "(N/M)") if ever re-sharded.
    name: E2E Tests${{ matrix.total-shards == 1 && '' || format(' ({0}/{1})', matrix.shard-index, matrix.total-shards) }}
    needs: [changes]
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      # Single shard (was 4 shards, max-parallel 3). On the free-tier capped
      # runner pool with many concurrent PRs, the pool is saturated, so total
      # runner-minutes — not per-PR wall-clock — governs how fast the whole PR
      # backlog clears. Each shard job re-pays a fixed ~100s setup (docker/DB
      # bring-up), so cost ≈ n·setup + testTime is minimized at n=1; sharding's
      # parallelism buys nothing when there are no idle runners to absorb it.
      # In-job parallelism still comes from Playwright `workers` (playwright.config.ts),
      # so total test time is unchanged. Restore the array to re-shard if the
      # runner cap is ever raised.
      matrix:
        shard-index: [1]
        total-shards: [1]

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      # --- Dependency Caching ---
      - name: Cache vendor directory
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: vendor-cache
        with:
          path: ibl5/vendor
          key: ${{ runner.os }}-vendor-${{ hashFiles('ibl5/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-vendor-

      - name: Cache node_modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: node-modules-cache
        with:
          path: ibl5/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('ibl5/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install JS dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        working-directory: ibl5
        run: bun install

      - name: Install Composer dependencies
        if: steps.vendor-cache.outputs.cache-hit != 'true'
        working-directory: ibl5
        run: composer install --no-interaction --no-progress --prefer-dist --ignore-platform-reqs

      # --- Docker E2E Setup ---
      - uses: ./.github/actions/setup-docker-e2e
        with:
          php-image: ${{ needs.changes.outputs.runtime == 'true' && 'build' || 'pull' }}
          build-css: 'true'
          with-playwright: 'true'
          test-user: ${{ secrets.IBL_TEST_USER || 'ci-e2e-user' }}
          test-pass: ${{ secrets.IBL_TEST_PASS || 'ci-e2e-pass-not-secret' }}
          test-user-regular: ${{ secrets.IBL_TEST_USER_REGULAR || 'ci-e2e-regular' }}
          test-pass-regular: ${{ secrets.IBL_TEST_PASS_REGULAR || 'e2e-regular-pass' }}

      # --- Fixture-drift baseline (runtime mutator-isolation gate — ADR-0052) ---
      - name: Snapshot fixture baseline
        run: bin/check-e2e-fixture-drift snapshot /tmp/fixture-before.txt

      # --- Run Sharded Tests ---
      - name: Run E2E tests
        env:
          IBL_TEST_USER: ${{ secrets.IBL_TEST_USER || 'ci-e2e-user' }}
          IBL_TEST_PASS: ${{ secrets.IBL_TEST_PASS || 'ci-e2e-pass-not-secret' }}
          IBL_TEST_USER_REGULAR: ${{ secrets.IBL_TEST_USER_REGULAR || 'ci-e2e-regular' }}
          IBL_TEST_PASS_REGULAR: ${{ secrets.IBL_TEST_PASS_REGULAR || 'e2e-regular-pass' }}
        run: |
          docker run --rm \
            --network ibl5-e2e \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}/ibl5:/ibl5" \
            -w /ibl5 \
            -e "BASE_URL=http://php/ibl5/" \
            -e "IBL_TEST_USER=$IBL_TEST_USER" \
            -e "IBL_TEST_PASS=$IBL_TEST_PASS" \
            -e "IBL_TEST_USER_REGULAR=$IBL_TEST_USER_REGULAR" \
            -e "IBL_TEST_PASS_REGULAR=$IBL_TEST_PASS_REGULAR" \
            -e "HOME=/tmp" \
            "$PW_IMAGE" \
            npx playwright test \
              --project=chromium \
              --shard=${{ matrix.shard-index }}/${{ matrix.total-shards }} \
              --reporter=blob

      - name: Assert no fixture drift
        if: ${{ !cancelled() }}
        run: |
          if [ ! -f /tmp/fixture-before.txt ]; then
            echo "Skipping drift check — baseline snapshot missing (upstream setup failed)."
            exit 0
          fi
          bin/check-e2e-fixture-drift snapshot /tmp/fixture-after.txt
          bin/check-e2e-fixture-drift diff /tmp/fixture-before.txt /tmp/fixture-after.txt

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: blob-report-${{ matrix.shard-index }}
          path: ibl5/blob-report/
          retention-days: 1

      - name: Upload shard test results
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results-shard-${{ matrix.shard-index }}
          path: ibl5/test-results/
          retention-days: 1

      - name: Dump PHP error log
        if: failure()
        run: |
          echo "=== PHP error log ==="
          docker compose -f docker-compose.ci.yml exec -T php cat /tmp/php_errors.log 2>/dev/null || echo "(no php_errors.log)"
          echo ""
          echo "=== Application log (last 30 lines) ==="
          docker compose -f docker-compose.ci.yml exec -T php sh -c 'tail -30 /var/www/html/ibl5/logs/*.log 2>/dev/null' || echo "(no app logs)"

      - name: Stop Docker containers
        if: always()
        run: docker compose -f docker-compose.ci.yml down

  e2e-mutators:
    name: E2E Mutators (non-sharded, dedicated DB)
    needs: [changes]
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      # --- Dependency Caching ---
      - name: Cache vendor directory
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: vendor-cache
        with:
          path: ibl5/vendor
          key: ${{ runner.os }}-vendor-${{ hashFiles('ibl5/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-vendor-

      - name: Cache node_modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: node-modules-cache
        with:
          path: ibl5/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('ibl5/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install JS dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        working-directory: ibl5
        run: bun install

      - name: Install Composer dependencies
        if: steps.vendor-cache.outputs.cache-hit != 'true'
        working-directory: ibl5
        run: composer install --no-interaction --no-progress --prefer-dist --ignore-platform-reqs

      # --- Docker E2E Setup (fresh, dedicated DB for this job) ---
      - uses: ./.github/actions/setup-docker-e2e
        with:
          php-image: ${{ needs.changes.outputs.runtime == 'true' && 'build' || 'pull' }}
          build-css: 'true'
          with-playwright: 'true'
          test-user: ${{ secrets.IBL_TEST_USER || 'ci-e2e-user' }}
          test-pass: ${{ secrets.IBL_TEST_PASS || 'ci-e2e-pass-not-secret' }}
          test-user-regular: ${{ secrets.IBL_TEST_USER_REGULAR || 'ci-e2e-regular' }}
          test-pass-regular: ${{ secrets.IBL_TEST_PASS_REGULAR || 'e2e-regular-pass' }}

      # --- Run the destructive mutator specs, serially, against this job's own DB ---
      - name: Run E2E mutator tests
        env:
          IBL_TEST_USER: ${{ secrets.IBL_TEST_USER || 'ci-e2e-user' }}
          IBL_TEST_PASS: ${{ secrets.IBL_TEST_PASS || 'ci-e2e-pass-not-secret' }}
          IBL_TEST_USER_REGULAR: ${{ secrets.IBL_TEST_USER_REGULAR || 'ci-e2e-regular' }}
          IBL_TEST_PASS_REGULAR: ${{ secrets.IBL_TEST_PASS_REGULAR || 'e2e-regular-pass' }}
        run: |
          docker run --rm \
            --network ibl5-e2e \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}/ibl5:/ibl5" \
            -w /ibl5 \
            -e "BASE_URL=http://php/ibl5/" \
            -e "IBL_TEST_USER=$IBL_TEST_USER" \
            -e "IBL_TEST_PASS=$IBL_TEST_PASS" \
            -e "IBL_TEST_USER_REGULAR=$IBL_TEST_USER_REGULAR" \
            -e "IBL_TEST_PASS_REGULAR=$IBL_TEST_PASS_REGULAR" \
            -e "HOME=/tmp" \
            "$PW_IMAGE" \
            npx playwright test \
              --project=mutators \
              --workers=1 \
              --reporter=blob

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: blob-report-mutators
          path: ibl5/blob-report/
          retention-days: 1

      - name: Upload mutator test results
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results-mutators
          path: ibl5/test-results/
          retention-days: 1

      - name: Dump PHP error log
        if: failure()
        run: |
          echo "=== PHP error log ==="
          docker compose -f docker-compose.ci.yml exec -T php cat /tmp/php_errors.log 2>/dev/null || echo "(no php_errors.log)"
          echo ""
          echo "=== Application log (last 30 lines) ==="
          docker compose -f docker-compose.ci.yml exec -T php sh -c 'tail -30 /var/www/html/ibl5/logs/*.log 2>/dev/null' || echo "(no app logs)"

      - name: Stop Docker containers
        if: always()
        run: docker compose -f docker-compose.ci.yml down

  ibl6-visual:
    name: IBL6 Visual Regression
    needs: [changes]
    if: needs.changes.outputs.ibl6 == 'true' || needs.changes.outputs.baseline == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          token: ${{ contains(github.event.pull_request.labels.*.name, 'update-baselines') && secrets.CI_PAT || github.token }}
          ref: ${{ github.head_ref || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: IBL6/package-lock.json

      - uses: ./.github/actions/setup-docker-e2e
        with:
          ibl6-image: build
          php-image: ${{ needs.changes.outputs.runtime == 'true' && 'build' || 'pull' }}

      - name: Wait for ibl6 healthy
        run: |
          deadline=$((SECONDS + 120))
          while ! docker compose -f docker-compose.ci.yml exec -T ibl6 wget -qO /dev/null http://127.0.0.1:3001/health 2>/dev/null; do
            if [ $SECONDS -ge $deadline ]; then
              echo "::error::ibl6 container not healthy after 2 min"
              docker compose -f docker-compose.ci.yml logs ibl6
              exit 1
            fi
            sleep 2
          done
          echo "ibl6 is healthy"

      - name: Derive Playwright image tag
        run: |
          tag="$(bin/playwright-image-tag IBL6/package.json)"
          echo "PW_IMAGE=$tag" >> "$GITHUB_ENV"

      - name: Pull Playwright image
        run: docker pull "$PW_IMAGE"

      - name: Install IBL6 dependencies
        working-directory: IBL6
        run: npm ci

      - name: Run IBL6 visual regression tests
        id: ibl6-visual-regression
        continue-on-error: ${{ contains(github.event.pull_request.labels.*.name, 'update-baselines') }}
        run: |
          docker run --rm \
            --network ibl5-e2e \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}/IBL6:/IBL6" \
            -w /IBL6 \
            -e "BASE_URL=http://ibl6:3001" \
            -e "HOME=/tmp" \
            "$PW_IMAGE" \
            npx playwright test --config=playwright.visual.config.ts

      - name: Regenerate IBL6 visual regression baselines
        id: ibl6-regen-baselines
        if: github.event_name == 'pull_request' && steps.ibl6-visual-regression.outcome == 'failure' && contains(github.event.pull_request.labels.*.name, 'update-baselines')
        run: |
          docker run --rm \
            --network ibl5-e2e \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}/IBL6:/IBL6" \
            -w /IBL6 \
            -e "BASE_URL=http://ibl6:3001" \
            -e "HOME=/tmp" \
            "$PW_IMAGE" \
            npx playwright test --config=playwright.visual.config.ts --update-snapshots

      - name: Commit and push updated IBL6 baselines
        if: always() && github.event_name == 'pull_request' && steps.ibl6-visual-regression.outcome == 'failure' && contains(github.event.pull_request.labels.*.name, 'update-baselines')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add IBL6/e2e/boxscore.visual.spec.ts-snapshots/
          if git diff --cached --quiet; then
            echo "No baseline changes detected"
          else
            git commit -m "test: update IBL6 visual regression baselines [auto]"
            git push
          fi

      - name: Remove update-baselines label
        if: always() && steps.ibl6-regen-baselines.outcome != 'skipped' && github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'update-baselines')
        env:
          GH_TOKEN: ${{ secrets.CI_PAT }}
        run: gh pr edit ${{ github.event.pull_request.number }} --remove-label update-baselines

      - name: Upload IBL6 visual regression report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ibl6-visual-regression-report
          path: IBL6/test-results/
          retention-days: 7

      - name: Stop Docker containers
        if: always()
        run: docker compose -f docker-compose.ci.yml down

