name: Build and Deploy
on:
  push:
    branches:
      - production

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  pre-flight:
    name: Pre-flight (composer --no-dev + migrate + validate-schema dry-run)
    uses: ./.github/workflows/deploy-rehearsal.yml
    # Reusable workflows receive NO secrets by default; the rehearsal needs the
    # deploy SSH secrets (PORT/HOST/USERNAME/PRIVATE_KEY) to clone prod over SSH.
    secrets: inherit

  build-and-deploy:
    name: Build and Deploy
    needs: pre-flight
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: rm -f package-lock.json && npm install
        working-directory: ibl5

      - name: Build CSS
        run: npx @tailwindcss/cli -i design/input.css -o themes/IBL/style/style.css --minify
        working-directory: ibl5

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p ${{ secrets.PORT }} ${{ secrets.HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
        env:
          DEPLOY_KEY: ${{ secrets.PRIVATE_KEY }}

      - name: Stop IBL6 to free resources for deploy
        run: |
          ssh -p ${{ secrets.PORT }} -i ~/.ssh/id_deploy ${{ secrets.USERNAME }}@${{ secrets.HOST }} '
            echo "Stop IBL6 to free resources for deploy" > /tmp/ibl5-last-deploy-step
            pm2 stop ibl6 2>/dev/null && echo "IBL6 stopped" || echo "IBL6 was not running"
          '

      - name: Pull latest code on server
        run: |
          ssh -p ${{ secrets.PORT }} -i ~/.ssh/id_deploy ${{ secrets.USERNAME }}@${{ secrets.HOST }} '
            echo "Pull latest code on server" > /tmp/ibl5-last-deploy-step
            set -e
            cd www
            git fetch origin
            git reset --hard origin/production
          '

      - name: Install PHP dependencies
        run: |
          ssh -p ${{ secrets.PORT }} -i ~/.ssh/id_deploy ${{ secrets.USERNAME }}@${{ secrets.HOST }} '
            echo "Install PHP dependencies" > /tmp/ibl5-last-deploy-step
            set -e
            cd www/ibl5
            composer install --no-dev --no-interaction --optimize-autoloader
          '

      - name: Run database migrations
        run: |
          ssh -p ${{ secrets.PORT }} -i ~/.ssh/id_deploy ${{ secrets.USERNAME }}@${{ secrets.HOST }} '
            echo "Run database migrations" > /tmp/ibl5-last-deploy-step
            set -e
            cd www
            php ibl5/bin/migrate
          '

      - name: Validate database schema
        run: |
          ssh -p ${{ secrets.PORT }} -i ~/.ssh/id_deploy ${{ secrets.USERNAME }}@${{ secrets.HOST }} '
            echo "Validate database schema" > /tmp/ibl5-last-deploy-step
            set -e
            cd www
            php ibl5/bin/validate-schema
          '

      - name: Deploy compiled CSS to server
        run: scp -P ${{ secrets.PORT }} -i ~/.ssh/id_deploy ibl5/themes/IBL/style/style.css ${{ secrets.USERNAME }}@${{ secrets.HOST }}:www/ibl5/themes/IBL/style/style.css

      - name: Flush OPcache
        run: |
          ssh -p ${{ secrets.PORT }} -i ~/.ssh/id_deploy ${{ secrets.USERNAME }}@${{ secrets.HOST }} '
            echo "Flush OPcache" > /tmp/ibl5-last-deploy-step
            killall lsphp && echo "OPcache flushed (lsphp workers killed)" || echo "No lsphp processes found"
          '

      - name: Purge page cache
        run: |
          ssh -p ${{ secrets.PORT }} -i ~/.ssh/id_deploy ${{ secrets.USERNAME }}@${{ secrets.HOST }} '
            echo "Purge page cache" > /tmp/ibl5-last-deploy-step
            cd www/ibl5
            php -r "require \"vendor/autoload.php\"; echo \"Purged \" . Cache\PageCache::purge() . \" cached pages\" . PHP_EOL;"
          '

      - name: Check for IBLbot changes
        id: iblbot-changes
        run: |
          if git diff --name-only ${{ github.event.before }}..${{ github.sha }} | grep -qE '^(ibl5/IBLbot/|\.github/workflows/main\.yml)'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy and restart IBLbot
        if: steps.iblbot-changes.outputs.changed == 'true'
        run: |
          ssh -p ${{ secrets.PORT }} -i ~/.ssh/id_deploy ${{ secrets.USERNAME }}@${{ secrets.HOST }} '
            echo "Deploy and restart IBLbot" > /tmp/ibl5-last-deploy-step
            set -e
            cd www/ibl5/IBLbot

            echo "Installing dependencies..."
            npm install --include=dev

            echo "Building TypeScript..."
            npm run build

            echo "Registering slash commands..."
            # Run the compiled output (node dist/...) instead of "tsx src/...".
            # tsx transpiles TypeScript through esbuild at runtime; on this
            # memory-tight server the esbuild service was getting SIGKILLed
            # ("TransformError: The service was stopped"), failing the deploy.
            # tsc already emits dist/deploy-commands.js in the build step above,
            # so node runs it with no esbuild involved.
            npm run deploy-commands:prod

            echo "Restarting IBLbot via PM2..."
            pm2 startOrRestart ecosystem.config.cjs --update-env
            pm2 save

            echo "IBLbot deployed successfully (PID: $(pm2 pid iblbot))"
          '

      - name: Check for IBL6 changes
        id: ibl6-changes
        run: |
          if git diff --name-only ${{ github.event.before }}..${{ github.sha }} | grep -qE '^(IBL6/|\.github/workflows/main\.yml)'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build IBL6
        if: steps.ibl6-changes.outputs.changed == 'true'
        run: npm ci && npm run build
        working-directory: IBL6

      - name: Deploy IBL6 build to server
        if: steps.ibl6-changes.outputs.changed == 'true'
        run: |
          ssh -p ${{ secrets.PORT }} -i ~/.ssh/id_deploy ${{ secrets.USERNAME }}@${{ secrets.HOST }} 'rm -rf www/IBL6/build'
          scp -r -P ${{ secrets.PORT }} -i ~/.ssh/id_deploy IBL6/build ${{ secrets.USERNAME }}@${{ secrets.HOST }}:www/IBL6/

      - name: Install IBL6 deps and deploy build
        if: steps.ibl6-changes.outputs.changed == 'true'
        run: |
          ssh -p ${{ secrets.PORT }} -i ~/.ssh/id_deploy ${{ secrets.USERNAME }}@${{ secrets.HOST }} '
            set -e
            cd www/IBL6

            echo "Installing production dependencies..."
            npm ci --omit=dev
          '

      - name: Start IBL6
        if: ${{ !cancelled() }}
        run: |
          ssh -p ${{ secrets.PORT }} -i ~/.ssh/id_deploy ${{ secrets.USERNAME }}@${{ secrets.HOST }} '
            echo "Start IBL6" > /tmp/ibl5-last-deploy-step
            cd www/IBL6
            mkdir -p logs
            # delete + start (not restart --update-env) so pm2 re-reads script,
            # wait_ready, and listen_timeout from ecosystem.config.cjs. With
            # wait_ready, this start call blocks until IBL6 signals ready, so it
            # is itself the readiness gate. The app is already stopped (see the
            # "Stop IBL6 to free resources" step), so delete adds no real downtime.
            pm2 delete ibl6 2>/dev/null || true
            pm2 start ecosystem.config.cjs --only ibl6 --update-env
            pm2 save
            echo "IBL6 started (PID: $(pm2 pid ibl6))"
          '

      - name: Smoke test IBL6
        if: ${{ !cancelled() }}
        run: |
          # Poll IBL6's public /health FROM the box (whitelisted egress IP), not
          # from the runner. LiteSpeed mod_security bans the GitHub runner IP and
          # returns a uniform 415, which made a runner-side `curl -fsS` fail even
          # when IBL6 was healthy. SSH-piping the curl reuses the box's own IP and
          # bypasses that false positive — same fix #1014/ADR-0039 applied to the
          # notify-only smoke-prod.yml, now applied to this gating step. The ~30s
          # warmup poll still covers the proxy/TLS race after pm2 reports ready.
          poll() {
            ssh -p ${{ secrets.PORT }} -i ~/.ssh/id_deploy ${{ secrets.USERNAME }}@${{ secrets.HOST }} '
              for i in $(seq 1 6); do
                if curl -fsS --max-time 10 https://ibl6.iblhoops.net/health >/dev/null 2>&1; then
                  echo "IBL6 healthy (attempt $i)"
                  exit 0
                fi
                echo "Attempt $i failed, waiting 5s..."
                sleep 5
              done
              exit 1
            '
          }
          if poll; then exit 0; fi
          echo "Smoke test failed after warmup, restarting IBL6..."
          ssh -p ${{ secrets.PORT }} -i ~/.ssh/id_deploy ${{ secrets.USERNAME }}@${{ secrets.HOST }} 'pm2 restart ibl6'
          # Retry the poll instead of a single un-retried curl; restart re-honors
          # the wait_ready config it was started with.
          if poll; then
            echo "IBL6 recovered after restart"
            exit 0
          fi
          echo "IBL6 still down after restart"
          exit 1

  notify-deploy-failure:
    name: Notify Deploy Failure
    runs-on: ubuntu-latest
    # pre-flight failure → build-and-deploy is 'skipped', not 'failure'
    needs: [pre-flight, build-and-deploy]
    if: ${{ always() && (needs.build-and-deploy.result == 'failure' || needs.pre-flight.result == 'failure' || needs.pre-flight.result == 'cancelled') }}
    timeout-minutes: 5

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p ${{ secrets.PORT }} ${{ secrets.HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
        env:
          DEPLOY_KEY: ${{ secrets.PRIVATE_KEY }}

      - name: Capture deploy state from server
        id: state
        continue-on-error: true
        run: |
          OUTPUT=$(ssh -p ${{ secrets.PORT }} -i ~/.ssh/id_deploy ${{ secrets.USERNAME }}@${{ secrets.HOST }} '
            STEP=$(cat /tmp/ibl5-last-deploy-step 2>/dev/null || echo "unknown — deploy did not reach the server")
            cd www 2>/dev/null || { printf "STEP_NAME=%s\nLAST_MIGRATION=unknown\nDEPLOYED_SHA=unknown\n" "$STEP"; exit 0; }
            SHA=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
            MIG=$(mysql -N -e "SELECT migration FROM iblhoops_ibl5.migrations ORDER BY id DESC LIMIT 1" 2>/dev/null || echo "unknown")
            printf "STEP_NAME=%s\nLAST_MIGRATION=%s\nDEPLOYED_SHA=%s\n" "$STEP" "$MIG" "$SHA"
          ') || OUTPUT=$'STEP_NAME=unknown\nLAST_MIGRATION=unknown\nDEPLOYED_SHA=unknown'
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"

      - name: Send Discord DM
        env:
          OWNER_DISCORD_ID: ${{ secrets.OWNER_DISCORD_ID }}
          PREFLIGHT_RESULT: ${{ needs.pre-flight.result }}
          STEP_NAME: ${{ steps.state.outputs.STEP_NAME }}
          LAST_MIGRATION: ${{ steps.state.outputs.LAST_MIGRATION }}
          DEPLOYED_SHA: ${{ steps.state.outputs.DEPLOYED_SHA }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          STEP_NAME="${STEP_NAME:-unknown}"
          LAST_MIGRATION="${LAST_MIGRATION:-unknown}"
          DEPLOYED_SHA="${DEPLOYED_SHA:-unknown}"
          if [ "$PREFLIGHT_RESULT" = "failure" ] || [ "$PREFLIGHT_RESULT" = "cancelled" ]; then
            MSG=$(printf 'Production deploy BLOCKED — pre-flight rehearsal %s for commit %s. Deploy did not start.\n\nCurrently live: SHA %s, last applied migration: %s\n\nRun: %s' \
              "${PREFLIGHT_RESULT^^}" "$SHORT_SHA" "$DEPLOYED_SHA" "$LAST_MIGRATION" "$RUN_URL")
          else
            MSG=$(printf 'Production deploy FAILED at step: %s\n\nCommit: %s\nLast applied migration: %s\nDeployed SHA on box: %s\n\nRun: %s' \
              "$STEP_NAME" "$SHORT_SHA" "$LAST_MIGRATION" "$DEPLOYED_SHA" "$RUN_URL")
          fi

          PAYLOAD=$(jq -n --arg id "$OWNER_DISCORD_ID" --arg msg "$MSG" \
            '{content: {receivingUserDiscordID: $id, message: $msg}}')

          echo "$PAYLOAD" | ssh -p ${{ secrets.PORT }} -i ~/.ssh/id_deploy ${{ secrets.USERNAME }}@${{ secrets.HOST }} \
            'curl -s --max-time 10 -X POST http://localhost:50000/discordDM -H "Content-Type: application/json" -d @-' \
            || echo "IBLbot notification failed (bot may be down)"
