name: Cache Dependencies

# This workflow ensures vendor, node_modules, and the Docker image are always
# cached for CI workflows. Runs on schedule and when dependency files change.

on:
  # Run daily to keep cache fresh
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC

  # Allow manual trigger
  workflow_dispatch:

  # Run when dependencies change
  push:
    paths:
      - 'ibl5/composer.json'
      - 'ibl5/composer.lock'
      - 'ibl5/bun.lock'
      - 'ibl5/package.json'
      - 'Dockerfile'
      - 'docker/opcache.ini'
      - 'docker/entrypoint.sh'
    branches:
      - master
      - develop

permissions:
  packages: write

jobs:
  cache-dependencies:
    name: Pre-cache Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # --- PHP Dependencies ---
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, intl, pdo, pdo_mysql

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('ibl5/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Cache vendor directory
        uses: actions/cache@v5
        id: vendor-cache
        with:
          path: ibl5/vendor
          key: ${{ runner.os }}-vendor-${{ hashFiles('ibl5/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-vendor-

      - name: Install Composer dependencies
        if: steps.vendor-cache.outputs.cache-hit != 'true'
        working-directory: ibl5
        run: composer install --no-progress --no-interaction

      - name: Verify PHPUnit
        working-directory: ibl5
        run: |
          if [ -f "vendor/bin/phpunit" ]; then
            echo "PHPUnit cached successfully"
            vendor/bin/phpunit --version
          else
            echo "PHPUnit not found!"
            exit 1
          fi

      # --- JS Dependencies ---
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache node_modules
        uses: actions/cache@v5
        id: node-modules-cache
        with:
          path: ibl5/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('ibl5/bun.lock') }}

      - name: Install JS dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        working-directory: ibl5
        run: bun install

      # --- CML (for PR comment screenshots) ---
      - name: Cache CML
        uses: actions/cache@v5
        id: cml-cache
        with:
          path: ~/.cml
          key: ${{ runner.os }}-cml-0.20.7

      - name: Install CML
        if: steps.cml-cache.outputs.cache-hit != 'true'
        run: npm install --prefix ~/.cml @cmlrun/cml@0.20.7

      # --- Docker Image ---
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push PHP image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/a-jay85/ibl5/php-apache:latest

      # --- Summary ---
      - name: Cache summary
        run: |
          echo "## Cache Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### PHP" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.vendor-cache.outputs.cache-hit }}" == "true" ]; then
            echo "- Vendor cache: already up-to-date" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Vendor cache: updated" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- Key: \`${{ runner.os }}-vendor-${{ hashFiles('ibl5/composer.lock') }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### JavaScript" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.node-modules-cache.outputs.cache-hit }}" == "true" ]; then
            echo "- node_modules cache: already up-to-date" >> $GITHUB_STEP_SUMMARY
          else
            echo "- node_modules cache: updated" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- Key: \`${{ runner.os }}-bun-${{ hashFiles('ibl5/bun.lock') }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### CML" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.cml-cache.outputs.cache-hit }}" == "true" ]; then
            echo "- CML cache: already up-to-date" >> $GITHUB_STEP_SUMMARY
          else
            echo "- CML cache: updated" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Docker" >> $GITHUB_STEP_SUMMARY
          echo "- PHP-Apache image: pushed to ghcr.io/a-jay85/ibl5/php-apache:latest" >> $GITHUB_STEP_SUMMARY
