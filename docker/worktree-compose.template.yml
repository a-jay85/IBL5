services:
  php-{{SLUG}}:
    build: {{REPO_ROOT}}
    container_name: ibl5-php-{{SLUG}}
    restart: unless-stopped
    environment:
      DB_HOST: db-{{SLUG}}
      E2E_TESTING: 1
    volumes:
      - {{WORKTREE_PATH}}/ibl5:/var/www/html/ibl5
      - {{REPO_ROOT}}/ibl5/vendor:/var/www/html/ibl5/vendor
    depends_on:
      db-{{SLUG}}:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.{{SLUG}}.rule=Host(`{{SLUG}}.localhost`)
      - traefik.http.services.{{SLUG}}.loadbalancer.server.port=80
    networks:
      - default
      - ibl5-proxy

  db-{{SLUG}}:
    image: mariadb:10.6
    container_name: ibl5-db-{{SLUG}}
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: iblhoops_ibl5
      MARIADB_USER: iblhoops_chibul
      MARIADB_PASSWORD: "whereWTFhappens19!"
    volumes:
      - db-{{SLUG}}-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - default
      - ibl5-proxy

volumes:
  db-{{SLUG}}-data:

networks:
  ibl5-proxy:
    external: true
