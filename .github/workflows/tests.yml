name: Tests and Analysis

on:
  push:
    branches: [ master, develop ]
    paths:
      - '**.php'
      - 'ibl5/migrations/**.sql'
  pull_request:
    branches: [ master, develop ]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: PHPUnit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.4']

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-version }}
        extensions: mbstring, intl, pcov
        coverage: pcov

    - name: Cache vendor directory
      uses: actions/cache@v5
      with:
        path: ibl5/vendor
        key: ${{ runner.os }}-vendor-${{ hashFiles('ibl5/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-vendor-

    - name: Create config.php
      working-directory: ibl5
      run: cp config.php.example config.php

    - name: Install dependencies
      working-directory: ibl5
      run: composer install --no-progress --no-interaction

    - name: Run PHPUnit tests with coverage
      working-directory: ibl5
      run: |
        mkdir -p coverage
        echo "::group::Full PHPUnit output"
        set +eo pipefail
        vendor/bin/phpunit \
          --testdox \
          --coverage-clover coverage/clover.xml \
          --colors=always 2>&1 | tee /tmp/phpunit-output.txt
        PHPUNIT_EXIT=${PIPESTATUS[0]}
        set -eo pipefail
        echo "::endgroup::"

        if [ $PHPUNIT_EXIT -ne 0 ]; then
          echo ""
          echo "════════════════════════════════════════"
          echo "  FAILURE SUMMARY"
          echo "════════════════════════════════════════"
          sed 's/\x1b\[[0-9;]*m//g' /tmp/phpunit-output.txt | awk '/✔/{show=0} /✘/{show=1} show' || true
          echo ""
          sed 's/\x1b\[[0-9;]*m//g' /tmp/phpunit-output.txt | awk '/^FAILURES!$/,0' || true
          echo "════════════════════════════════════════"
        fi
        exit $PHPUNIT_EXIT

    - name: Check coverage threshold
      working-directory: ibl5
      run: php bin/check-coverage coverage/clover.xml 45

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report
        path: ibl5/coverage/
        retention-days: 7

  audit-php:
    name: PHP Dependency Audit
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        coverage: none

    - name: Install dependencies
      working-directory: ibl5
      run: composer install --no-progress --no-interaction

    - name: Audit PHP dependencies
      working-directory: ibl5
      run: composer audit

  audit-js:
    name: JS Dependency Audit
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: '22'

    - name: Audit JS dependencies
      working-directory: ibl5
      run: npm audit --audit-level=high

  db-integration:
    name: Database Integration Tests
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:10.6
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: ibl5
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        extensions: mbstring, intl, mysqli
        coverage: none

    - name: Cache vendor directory
      uses: actions/cache@v5
      with:
        path: ibl5/vendor
        key: ${{ runner.os }}-vendor-${{ hashFiles('ibl5/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-vendor-

    - name: Create config.php
      working-directory: ibl5
      run: cp config.php.example config.php

    - name: Install dependencies
      working-directory: ibl5
      run: composer install --no-progress --no-interaction

    - name: Apply migrations
      working-directory: ibl5
      run: bin/run-migrations-ci.sh -h 127.0.0.1 -u root -proot ibl5

    - name: Import seed data
      working-directory: ibl5
      run: mysql -h 127.0.0.1 -u root -proot ibl5 < tests/DatabaseIntegration/fixtures/db-seed.sql

    - name: Run database integration tests
      working-directory: ibl5
      env:
        DB_HOST: 127.0.0.1
        DB_USER: root
        DB_PASS: root
        DB_NAME: ibl5
      run: vendor/bin/phpunit --configuration phpunit.db.xml --no-progress --no-output --testdox-summary

  phpstan:
    name: PHPStan Analysis
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        extensions: mbstring, intl, mysqli
        coverage: none

    - name: Cache vendor directory
      uses: actions/cache@v5
      with:
        path: ibl5/vendor
        key: ${{ runner.os }}-vendor-${{ hashFiles('ibl5/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-vendor-

    - name: Install dependencies
      working-directory: ibl5
      run: composer install --no-progress --no-interaction

    - name: Run PHPStan
      working-directory: ibl5
      run: composer run analyse

  gate:
    name: Tests and Analysis
    if: always()
    needs: [test, audit-php, audit-js, db-integration, phpstan]
    runs-on: ubuntu-latest
    steps:
      - run: exit 1
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
