name: Auto-Rebase PRs

on:
  push:
    branches: [master]

jobs:
  rebase:
    name: Rebase open PRs onto master
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # CI_PAT is required so that force-pushes trigger pull_request events
          # (pushes via GITHUB_TOKEN are silently ignored by GitHub's anti-recursion guard).
          # This causes each rebased PR to re-run its applicable CI workflows naturally,
          # respecting existing path filters and trigger conditions.
          token: ${{ secrets.CI_PAT }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Rebase open PR branches
        env:
          GH_TOKEN: ${{ secrets.CI_PAT }}
        run: |
          # Get all open PRs targeting master
          prs=$(gh pr list --base master --state open --json number,headRefName --jq '.[] | "\(.number) \(.headRefName)"')

          if [ -z "$prs" ]; then
            echo "No open PRs targeting master"
            exit 0
          fi

          rebased=0
          skipped=0
          failed=0

          while IFS=' ' read -r pr_number branch; do
            echo "::group::PR #${pr_number} (${branch})"

            # Fetch the branch
            if ! git fetch origin "$branch"; then
              echo "::warning::Could not fetch branch ${branch}, skipping"
              ((++skipped))
              echo "::endgroup::"
              continue
            fi

            # Check if branch is already up-to-date with master
            merge_base=$(git merge-base "origin/${branch}" origin/master)
            master_sha=$(git rev-parse origin/master)
            if [ "$merge_base" = "$master_sha" ]; then
              echo "Already up-to-date, skipping"
              ((++skipped))
              echo "::endgroup::"
              continue
            fi

            # Attempt rebase
            git checkout "origin/${branch}" --detach
            if git rebase origin/master; then
              git push origin "HEAD:${branch}" --force-with-lease
              echo "✓ Rebased ${branch} onto master — CI will trigger via pull_request: synchronize"
              ((++rebased))
            else
              git rebase --abort
              echo "::warning::Rebase conflict on ${branch} (PR #${pr_number}) — skipping"
              ((++failed))
            fi

            git checkout --detach origin/master
            echo "::endgroup::"
          done <<< "$prs"

          echo "## Rebase Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Rebased: ${rebased}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Skipped (up-to-date or unfetchable): ${skipped}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Conflicts: ${failed}" >> "$GITHUB_STEP_SUMMARY"
