services:
  php:
    build: ${REPO_ROOT}
    container_name: ibl5-php-${SLUG}
    restart: unless-stopped
    environment:
      DB_HOST: db
      E2E_TESTING: 1
      MAIL_TRANSPORT: smtp
      MAIL_SMTP_HOST: ibl5-mailpit
      MAIL_SMTP_PORT: 1025
      MAIL_SMTP_ENCRYPTION: ""
    volumes:
      - ${WORKTREE_PATH}/ibl5:/var/www/html/ibl5
      - ${REPO_ROOT}/ibl5/vendor:/var/www/html/ibl5/vendor:ro
    depends_on:
      db:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.${SLUG}.rule=Host(`${SLUG}.localhost`)
      - traefik.http.services.${SLUG}.loadbalancer.server.port=80
    networks:
      - default
      - ibl5-proxy

  db:
    image: mariadb:10.6
    container_name: ibl5-db-${SLUG}
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: iblhoops_ibl5
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASS}
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - default
      - ibl5-proxy

  browsersync:
    build:
      context: ${REPO_ROOT}
      dockerfile: docker/Dockerfile.browsersync
    container_name: ibl5-bs-${SLUG}
    restart: unless-stopped
    volumes:
      - ${WORKTREE_PATH}/ibl5:/watch:ro
    depends_on:
      - php
    labels:
      - traefik.enable=true
      - traefik.http.routers.bs-${SLUG}.rule=Host(`bs-${SLUG}.localhost`)
      - traefik.http.services.bs-${SLUG}.loadbalancer.server.port=3000
    networks:
      - default
      - ibl5-proxy

volumes:
  db-data:

networks:
  ibl5-proxy:
    external: true
