name: Tests and Analysis

on:
  push:
    branches: [ master, develop ]
    paths:
      - '**.php'
      - 'ibl5/migrations/**.sql'
      - 'bin/**'
      - 'ibl5/bin/**'
  pull_request:
    branches: [ master, develop ]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      src: ${{ github.event_name == 'push' || github.event.pull_request.user.login == 'dependabot[bot]' || steps.filter.outputs.src == 'true' }}
      shell: ${{ github.event_name == 'push' || github.event.pull_request.user.login == 'dependabot[bot]' || steps.filter.outputs.shell == 'true' }}
    steps:
      - uses: dorny/paths-filter@v4
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: |
            src:
              - '**.php'
              - 'ibl5/migrations/**.sql'
              - 'ibl5/composer.json'
              - 'ibl5/composer.lock'
              - 'ibl5/phpunit.xml'
              - 'ibl5/phpunit.db.xml'
              - 'ibl5/phpstan.neon'
              - 'ibl5/phpstan-rules/**'
              - 'ibl5/tests/DatabaseIntegration/fixtures/**'
              - '.github/workflows/tests.yml'
            shell:
              - 'bin/**'
              - 'ibl5/bin/**'
              - '.github/workflows/tests.yml'

  test:
    name: PHPUnit Tests
    needs: [changes]
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.5']

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-version }}
        extensions: mbstring, intl, pcov
        coverage: pcov

    - name: Cache vendor directory
      uses: actions/cache@v5
      with:
        path: ibl5/vendor
        key: ${{ runner.os }}-vendor-${{ hashFiles('ibl5/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-vendor-

    - name: Create config.php
      working-directory: ibl5
      run: cp config.php.example config.php

    - name: Install dependencies
      working-directory: ibl5
      run: composer install --no-progress --no-interaction

    - name: Run PHPUnit tests with coverage
      working-directory: ibl5
      run: |
        mkdir -p coverage
        echo "::group::Full PHPUnit output"
        set +eo pipefail
        vendor/bin/phpunit \
          --testdox \
          --coverage-clover coverage/clover.xml \
          --colors=always 2>&1 | tee /tmp/phpunit-output.txt
        PHPUNIT_EXIT=${PIPESTATUS[0]}
        set -eo pipefail
        echo "::endgroup::"

        if [ $PHPUNIT_EXIT -ne 0 ]; then
          echo ""
          echo "════════════════════════════════════════"
          echo "  FAILURE SUMMARY"
          echo "════════════════════════════════════════"
          sed 's/\x1b\[[0-9;]*m//g' /tmp/phpunit-output.txt | awk '/✔/{show=0} /✘/{show=1} show' || true
          echo ""
          sed 's/\x1b\[[0-9;]*m//g' /tmp/phpunit-output.txt | awk '/^FAILURES!$/,0' || true
          echo "════════════════════════════════════════"
        fi
        exit $PHPUNIT_EXIT

    - name: Check coverage threshold
      working-directory: ibl5
      run: php bin/check-coverage coverage/clover.xml 70

    - name: Check if threshold needs ratcheting
      working-directory: ibl5
      run: |
        THRESHOLD=70
        BUFFER=5
        COVERAGE=$(php -r '
          $xml = simplexml_load_file("coverage/clover.xml");
          $m = $xml->xpath("/coverage/project/metrics")[0];
          echo round((int)$m["coveredstatements"] / (int)$m["statements"] * 100, 2);
        ')
        GAP=$(echo "$COVERAGE - $THRESHOLD" | bc)
        if (( $(echo "$GAP > $BUFFER" | bc -l) )); then
          NEW_THRESHOLD=$(echo "$COVERAGE - 2" | bc | cut -d. -f1)
          echo "::warning::Coverage is ${COVERAGE}%, threshold is ${THRESHOLD}%. Consider ratcheting to ${NEW_THRESHOLD}% in .github/workflows/tests.yml"
        fi

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report
        path: ibl5/coverage/
        retention-days: 7

  audit-php:
    name: PHP Dependency Audit
    needs: [changes]
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.5'
        coverage: none

    - name: Install dependencies
      working-directory: ibl5
      run: composer install --no-progress --no-interaction

    - name: Audit PHP dependencies
      working-directory: ibl5
      run: composer audit

  audit-js:
    name: JS Dependency Audit
    needs: [changes]
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: '22'

    - name: Audit JS dependencies
      working-directory: ibl5
      run: npm audit --audit-level=high

  db-integration:
    name: Database Integration Tests
    needs: [changes]
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: ibl5
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.5'
        extensions: mbstring, intl, mysqli
        coverage: none

    - name: Cache vendor directory
      uses: actions/cache@v5
      with:
        path: ibl5/vendor
        key: ${{ runner.os }}-vendor-${{ hashFiles('ibl5/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-vendor-

    - name: Create config.php
      working-directory: ibl5
      run: cp config.php.example config.php

    - name: Install dependencies
      working-directory: ibl5
      run: composer install --no-progress --no-interaction

    - name: Apply migrations
      working-directory: ibl5
      run: bin/run-migrations-ci.sh -h 127.0.0.1 -u root -proot ibl5

    - name: Import seed data
      working-directory: ibl5
      run: mysql -h 127.0.0.1 -u root -proot ibl5 < tests/DatabaseIntegration/fixtures/db-seed.sql

    - name: Run database integration tests
      working-directory: ibl5
      env:
        DB_HOST: 127.0.0.1
        DB_USER: root
        DB_PASS: root
        DB_NAME: ibl5
      run: vendor/bin/phpunit --configuration phpunit.db.xml --no-progress --no-output --testdox-summary

  phpstan:
    name: PHPStan Analysis
    needs: [changes]
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.5'
        extensions: mbstring, intl, mysqli
        coverage: none

    - name: Cache vendor directory
      uses: actions/cache@v5
      with:
        path: ibl5/vendor
        key: ${{ runner.os }}-vendor-${{ hashFiles('ibl5/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-vendor-

    - name: Install dependencies
      working-directory: ibl5
      run: composer install --no-progress --no-interaction

    - name: Run PHPStan
      working-directory: ibl5
      run: composer run analyse

  shellcheck:
    name: ShellCheck (bash 3.2 compat)
    needs: [changes]
    if: needs.changes.outputs.shell == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run shellcheck on bin/**
        run: |
          set -e
          # Find shell scripts: files with .sh extension OR bash/sh shebang
          mapfile -t scripts < <(
            {
              find bin ibl5/bin -type f -name '*.sh' 2>/dev/null || true
              find bin ibl5/bin -type f -not -name '*.sh' 2>/dev/null \
                | while read -r f; do
                    head -c 40 "$f" 2>/dev/null | grep -qE '^#!(/usr)?/bin/(ba)?sh' && echo "$f"
                  done
            } | sort -u
          )

          if [ ${#scripts[@]} -eq 0 ]; then
            echo "No shell scripts found — nothing to check."
            exit 0
          fi

          echo "Checking ${#scripts[@]} shell scripts with --severity=warning..."
          printf '  %s\n' "${scripts[@]}"
          echo ""

          # --severity=warning catches SC3044 (declare -A unsupported in bash 3.2)
          # and other portability issues. -s bash targets bash specifically; scripts
          # must work in bash 3.2 (macOS default shell).
          #
          # Excludes for pre-existing warnings, tracked as burn-down debt:
          #   SC2034 — unused variables (2 occurrences in bin/codebase-audit,
          #            bin/lib/wt-guards.sh)
          #   SC1090 — non-const source (db-sync-prod, db-export-prod, log-fetch-prod
          #            source dynamic .env file)
          #   SC2207 — array splitting suggestion (ibl5/bin/run-migrations-ci.sh:20,
          #            CI-only script, suggestion uses bash 4 mapfile)
          # Bash portability checks (SC3xxx) remain fully enforced.
          shellcheck --severity=warning --shell=bash \
            --exclude=SC2034,SC1090,SC2207 \
            "${scripts[@]}"

  host-mariadb-guard:
    name: Host mariadb grep guard
    needs: [changes]
    if: needs.changes.outputs.shell == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Grep for host mariadb invocations outside bin/db-query
        run: |
          set -e
          # Worktrees run a separate dockerized MariaDB per worktree. Calling the host
          # `mariadb` client with -h 127.0.0.1 bypasses worktree isolation and will read
          # or mutate the wrong database. Only bin/db-query is allowed to do this because
          # it hands off to docker exec internally.
          offenders=$(
            grep -rEn '^[[:space:]]*mariadb[[:space:]]+(-h[[:space:]]*127|-u[[:space:]]*root)' \
              bin/ ibl5/bin/ 2>/dev/null \
              | grep -v -E '(bin/db-query|\.md|tests\.yml)' \
              || true
          )

          if [ -n "$offenders" ]; then
            echo "FAIL: direct host mariadb invocations found in shell scripts."
            echo ""
            echo "$offenders"
            echo ""
            echo "Worktrees have isolated dockerized MariaDB instances. Use bin/db-query"
            echo "or 'docker exec <container> mariadb ...' instead of calling the host client."
            exit 1
          fi

          echo "OK: no host mariadb invocations found outside bin/db-query."

  gate:
    name: Tests and Analysis
    if: always()
    needs: [changes, test, audit-php, audit-js, db-integration, phpstan, shellcheck, host-mariadb-guard]
    runs-on: ubuntu-latest
    steps:
      - run: exit 1
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
