name: E2E Tests

on:
  pull_request:
    branches: [master]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mariadb:
        image: mariadb:10.6
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: ibl5
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mysqli, gd, pdo_mysql

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install JS dependencies
        working-directory: ibl5
        run: bun install

      - name: Install Playwright browsers
        working-directory: ibl5
        run: bunx playwright install chromium --with-deps

      - name: Install Composer dependencies
        working-directory: ibl5
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Import database schema
        run: |
          # Strip DEFINER clauses that reference the production user
          sed 's/DEFINER=`[^`]*`@`[^`]*`//g' ibl5/schema.sql \
            | mysql -h 127.0.0.1 -u root -proot ibl5

      - name: Import seed data
        run: mysql -h 127.0.0.1 -u root -proot ibl5 < ibl5/tests/e2e/fixtures/ci-seed.sql

      - name: Create test user
        env:
          IBL_TEST_USER: ${{ secrets.IBL_TEST_USER }}
          IBL_TEST_PASS: ${{ secrets.IBL_TEST_PASS }}
        run: |
          php <<'PHPSCRIPT'
          <?php
          $hash = password_hash(getenv('IBL_TEST_PASS'), PASSWORD_BCRYPT);
          $user = getenv('IBL_TEST_USER');
          $email = 'ci-test@example.com';
          $db = new mysqli('127.0.0.1', 'root', 'root', 'ibl5');

          $stmt = $db->prepare("INSERT INTO auth_users (email, password, username, status, verified, resettable, roles_mask, registered, force_logout) VALUES (?, ?, ?, 0, 1, 1, 0, ?, 0)");
          $time = time();
          $stmt->bind_param('sssi', $email, $hash, $user, $time);
          $stmt->execute();

          $stmt = $db->prepare("INSERT INTO nuke_users (username, user_email, user_ibl_team, user_password, name, user_avatar, bio, ublock, theme, user_regdate) VALUES (?, ?, 'Metros', ?, 'CI Test User', '', '', '', '', NOW())");
          $stmt->bind_param('sss', $user, $email, $hash);
          $stmt->execute();

          $db->close();
          echo "Test user created: $user\n";
          PHPSCRIPT

      - name: Create config.php
        working-directory: ibl5
        run: |
          cat > config.php <<'PHPCFG'
          <?php
          if (realpath(__FILE__) === realpath($_SERVER['SCRIPT_FILENAME'])) {
              header("Location: index.php");
              exit();
          }
          $display_errors = true;
          $dbhost = '127.0.0.1';
          $dbuname = 'root';
          $dbpass = 'root';
          $dbname = 'ibl5';
          $prefix = 'nuke';
          $user_prefix = 'nuke';
          $dbtype = 'MySQL';
          $sitekey = 'ci-test-key-not-secret';
          $subscription_url = '';
          $admin_file = 'admin';
          PHPCFG

      - name: Build CSS
        working-directory: ibl5
        run: bunx @tailwindcss/cli -i design/input.css -o themes/IBL/style/style.css

      - name: Start PHP server
        run: |
          php -S 0.0.0.0:8080 -t $GITHUB_WORKSPACE $GITHUB_WORKSPACE/ibl5/router.php &
          echo "PHP server PID: $!"

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/ibl5/ > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start"
          exit 1

      - name: Run E2E tests
        working-directory: ibl5
        env:
          BASE_URL: http://localhost:8080/ibl5/
          IBL_TEST_USER: ${{ secrets.IBL_TEST_USER }}
          IBL_TEST_PASS: ${{ secrets.IBL_TEST_PASS }}
        run: bunx playwright test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ibl5/playwright-report/
          retention-days: 7
