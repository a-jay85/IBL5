name: Tests and Analysis

on:
  push:
    branches: [ master, develop ]
    paths:
      - '**.php'
      - 'ibl5/migrations/**.sql'
  pull_request:
    branches: [ master, develop ]
    paths:
      - '**.php'
      - 'ibl5/migrations/**.sql'

jobs:
  test:
    name: PHPUnit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.4']

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-version }}
        extensions: mbstring, intl, pcov
        coverage: pcov

    - name: Cache vendor directory
      uses: actions/cache@v5
      with:
        path: ibl5/vendor
        key: ${{ runner.os }}-vendor-${{ hashFiles('ibl5/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-vendor-

    - name: Create config.php
      working-directory: ibl5
      run: cp config.php.example config.php

    - name: Install dependencies
      working-directory: ibl5
      run: composer install --no-progress --no-interaction

    - name: Run PHPUnit tests with coverage
      working-directory: ibl5
      run: |
        mkdir -p coverage
        vendor/bin/phpunit \
          --configuration phpunit.ci.xml \
          --testdox \
          --coverage-clover coverage/clover.xml \
          --colors=always

    - name: Check coverage threshold
      working-directory: ibl5
      run: php bin/check-coverage coverage/clover.xml 55

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: ibl5/coverage/
        retention-days: 7

  audit-php:
    name: PHP Dependency Audit
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        coverage: none

    - name: Install dependencies
      working-directory: ibl5
      run: composer install --no-progress --no-interaction

    - name: Audit PHP dependencies
      working-directory: ibl5
      run: composer audit

  audit-js:
    name: JS Dependency Audit
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Audit JS dependencies
      working-directory: ibl5
      run: npm audit --audit-level=high

  phpstan:
    name: PHPStan Analysis
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        extensions: mbstring, intl, mysqli
        coverage: none

    - name: Cache vendor directory
      uses: actions/cache@v5
      with:
        path: ibl5/vendor
        key: ${{ runner.os }}-vendor-${{ hashFiles('ibl5/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-vendor-

    - name: Install dependencies
      working-directory: ibl5
      run: composer install --no-progress --no-interaction

    - name: Run PHPStan
      working-directory: ibl5
      run: composer run analyse
