[opcache]
; Disabled in dev — VirtioFS bind mounts on macOS don't reliably propagate
; file mtime changes, so opcache serves stale bytecode after edits.
; Production uses LiteSpeed with its own opcache config, not this file.
opcache.enable=0
opcache.memory_consumption=128
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=10000
opcache.validate_timestamps=1
opcache.revalidate_freq=0
