name: Lighthouse CI

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      src: ${{ github.event.pull_request.user.login == 'dependabot[bot]' || steps.filter.outputs.src == 'true' }}
    steps:
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            src:
              - '**.php'
              - '**.css'
              - '**.ts'
              - '**.js'
              - 'ibl5/design/**'
              - 'ibl5/migrations/**.sql'
              - 'Dockerfile'
              - 'docker-compose*.yml'
              - '.github/workflows/lighthouse.yml'

  lighthouse:
    name: Performance Audit
    needs: [changes]
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      # --- Dependency Caching ---
      - name: Cache vendor directory
        uses: actions/cache@v5
        with:
          path: ibl5/vendor
          key: ${{ runner.os }}-vendor-${{ hashFiles('ibl5/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-vendor-

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: ibl5/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('ibl5/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        working-directory: ibl5
        run: |
          composer install --no-interaction --no-progress --prefer-dist --ignore-platform-reqs
          bun install

      # --- Docker E2E Setup ---
      - uses: ./.github/actions/setup-docker-e2e
        with:
          build-css: 'true'

      # --- Lighthouse ---
      - name: Run Lighthouse CI
        working-directory: ibl5
        run: bunx @lhci/cli autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
          CHROME_PATH: /usr/bin/google-chrome-stable

      # --- Cleanup ---
      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.ci.yml down --volumes
