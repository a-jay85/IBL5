name: E2E Tests

on:
  pull_request:
    branches: [master]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mariadb:
        image: mariadb:10.6
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: ibl5
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mysqli, gd, pdo_mysql, opcache
          ini-values: opcache.enable=1, opcache.enable_cli=1, opcache.memory_consumption=128, opcache.validate_timestamps=0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      # --- Dependency Caching ---
      - name: Cache vendor directory
        uses: actions/cache@v5
        with:
          path: ibl5/vendor
          key: ${{ runner.os }}-vendor-${{ hashFiles('ibl5/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-vendor-

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: ibl5/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('ibl5/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install JS dependencies
        working-directory: ibl5
        run: bun install

      - name: Get Playwright version
        id: playwright-version
        working-directory: ibl5
        run: echo "version=$(bunx playwright --version)" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: ibl5
        run: bunx playwright install chromium --with-deps

      - name: Restore Playwright system deps from cache
        uses: actions/cache/restore@v5
        id: apt-cache
        with:
          path: ~/playwright-apt-cache
          key: ${{ runner.os }}-playwright-apt-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright system deps
        working-directory: ibl5
        run: |
          if [ -d ~/playwright-apt-cache ] && ls ~/playwright-apt-cache/*.deb 1>/dev/null 2>&1; then
            echo "Installing $(ls ~/playwright-apt-cache/*.deb | wc -l) cached .deb files"
            sudo cp ~/playwright-apt-cache/*.deb /var/cache/apt/archives/
          fi
          bunx playwright install-deps chromium

      - name: Install Composer dependencies
        working-directory: ibl5
        run: composer install --no-interaction --no-progress --prefer-dist

      # --- Database Setup ---
      - name: Import database schema
        run: |
          # Strip DEFINER clauses that reference the production user
          sed 's/DEFINER=`[^`]*`@`[^`]*`//g' ibl5/schema.sql \
            | mysql -h 127.0.0.1 -u root -proot ibl5

      - name: Apply migrations
        run: |
          chmod +x ibl5/bin/run-migrations-ci.sh
          ibl5/bin/run-migrations-ci.sh -h 127.0.0.1 -u root -proot ibl5

      - name: Import seed data
        run: mysql -h 127.0.0.1 -u root -proot ibl5 < ibl5/tests/e2e/fixtures/ci-seed.sql

      - name: Create test user
        env:
          IBL_TEST_USER: ${{ secrets.IBL_TEST_USER }}
          IBL_TEST_PASS: ${{ secrets.IBL_TEST_PASS }}
        run: |
          php <<'PHPSCRIPT'
          <?php
          $hash = password_hash(getenv('IBL_TEST_PASS'), PASSWORD_BCRYPT);
          $user = getenv('IBL_TEST_USER');
          $email = 'ci-test@example.com';
          $db = new mysqli('127.0.0.1', 'root', 'root', 'ibl5');

          // roles_mask = 1 grants ADMIN role (Delight\Auth\Role::ADMIN)
          // Required for admin page E2E tests (updateAllTheThings.php, block.php)
          $stmt = $db->prepare("INSERT INTO auth_users (email, password, username, status, verified, resettable, roles_mask, registered, force_logout) VALUES (?, ?, ?, 0, 1, 1, 1, ?, 0)");
          $time = time();
          $stmt->bind_param('sssi', $email, $hash, $user, $time);
          $stmt->execute();

          $stmt = $db->prepare("INSERT INTO nuke_users (username, user_email, user_ibl_team, user_password, name, user_avatar, bio, ublock, theme, user_regdate) VALUES (?, ?, 'Metros', ?, 'CI Test User', '', '', '', '', NOW())");
          $stmt->bind_param('sss', $user, $email, $hash);
          $stmt->execute();

          $stmt = $db->prepare("UPDATE ibl_team_info SET gm_username = ? WHERE team_name = 'Metros'");
          $stmt->bind_param('s', $user);
          $stmt->execute();

          $db->close();
          echo "Test user created: $user\n";
          PHPSCRIPT

      # --- App Setup ---
      - name: Create config.php
        working-directory: ibl5
        run: |
          cat > config.php <<'PHPCFG'
          <?php
          if (realpath(__FILE__) === realpath($_SERVER['SCRIPT_FILENAME'])) {
              header("Location: index.php");
              exit();
          }
          $display_errors = true;
          $dbhost = '127.0.0.1';
          $dbuname = 'root';
          $dbpass = 'root';
          $dbname = 'ibl5';
          $prefix = 'nuke';
          $user_prefix = 'nuke';
          $dbtype = 'MySQL';
          $sitekey = 'ci-test-key-not-secret';
          $subscription_url = '';
          $admin_file = 'admin';
          PHPCFG

      - name: Build CSS
        working-directory: ibl5
        run: bunx @tailwindcss/cli -i design/input.css -o themes/IBL/style/style.css

      - name: Start PHP server
        run: |
          PHP_CLI_SERVER_WORKERS=4 E2E_TESTING=1 php -S 0.0.0.0:8080 -t $GITHUB_WORKSPACE $GITHUB_WORKSPACE/ibl5/router.php &
          echo "PHP server PID: $!"

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/ibl5/ > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start"
          exit 1

      # --- Run Tests ---
      - name: Run E2E tests
        working-directory: ibl5
        env:
          BASE_URL: http://localhost:8080/ibl5/
          IBL_TEST_USER: ${{ secrets.IBL_TEST_USER }}
          IBL_TEST_PASS: ${{ secrets.IBL_TEST_PASS }}
        run: bunx playwright test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: ibl5/playwright-report/
          retention-days: 7
