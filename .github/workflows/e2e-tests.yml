name: E2E Tests

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, labeled]

jobs:
  e2e:
    name: Visual Regression
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6
        with:
          # PAT is needed when update-baselines label is present so the push triggers a new CI run.
          # Default GITHUB_TOKEN pushes don't trigger workflows (GitHub's anti-loop protection).
          token: ${{ contains(github.event.pull_request.labels.*.name, 'update-baselines') && secrets.CI_PAT || github.token }}
          ref: ${{ github.head_ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      # --- Dependency Caching ---
      - name: Cache vendor directory
        uses: actions/cache@v5
        with:
          path: ibl5/vendor
          key: ${{ runner.os }}-vendor-${{ hashFiles('ibl5/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-vendor-

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: ibl5/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('ibl5/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install JS dependencies
        working-directory: ibl5
        run: bun install

      - name: Install Composer dependencies
        working-directory: ibl5
        run: composer install --no-interaction --no-progress --prefer-dist --ignore-platform-reqs

      # --- App Setup (must exist before Docker build) ---
      - name: Create config.php
        working-directory: ibl5
        run: |
          cat > config.php <<'PHPCFG'
          <?php
          if (realpath(__FILE__) === realpath($_SERVER['SCRIPT_FILENAME'])) {
              header("Location: index.php");
              exit();
          }
          $display_errors = true;
          $dbhost = getenv('DB_HOST') ?: '127.0.0.1';
          $dbuname = 'root';
          $dbpass = 'root';
          $dbname = 'ibl5';
          $prefix = 'nuke';
          $user_prefix = 'nuke';
          $dbtype = 'MySQL';
          $sitekey = 'ci-test-key-not-secret';
          $subscription_url = '';
          $admin_file = 'admin';
          PHPCFG

      - name: Build CSS
        working-directory: ibl5
        run: bunx @tailwindcss/cli -i design/input.css -o themes/IBL/style/style.css

      # --- Docker Compose ---
      - name: Pull or build PHP image
        run: |
          docker pull ghcr.io/a-jay85/ibl5/php-apache:latest || \
          docker build -t ghcr.io/a-jay85/ibl5/php-apache:latest .

      - name: Start Docker containers
        run: docker compose -f docker-compose.ci.yml up -d --wait

      - name: Pull Playwright image (background)
        run: nohup docker pull mcr.microsoft.com/playwright:v1.58.2-jammy > /tmp/playwright-pull.log 2>&1 &

      # --- Database Setup ---
      - name: Create database and apply migrations
        run: |
          chmod +x ibl5/bin/run-migrations-ci.sh
          ibl5/bin/run-migrations-ci.sh -h 127.0.0.1 -u root -proot ibl5

      - name: Import seed data
        run: |
          docker compose -f docker-compose.ci.yml exec -T mariadb \
            mariadb -u root -proot ibl5 < ibl5/tests/e2e/fixtures/ci-seed.sql

      - name: Create test user
        env:
          IBL_TEST_USER: ${{ secrets.IBL_TEST_USER }}
          IBL_TEST_PASS: ${{ secrets.IBL_TEST_PASS }}
        run: |
          docker compose -f docker-compose.ci.yml exec \
            -e IBL_TEST_USER="$IBL_TEST_USER" \
            -e IBL_TEST_PASS="$IBL_TEST_PASS" \
            -T php php <<'PHPSCRIPT'
          <?php
          $hash = password_hash(getenv('IBL_TEST_PASS'), PASSWORD_BCRYPT);
          $user = getenv('IBL_TEST_USER');
          $email = 'ci-test@example.com';
          $db = new mysqli('mariadb', 'root', 'root', 'ibl5');

          // roles_mask = 1 grants ADMIN role (Delight\Auth\Role::ADMIN)
          // Required for admin page E2E tests (updateAllTheThings.php, block.php)
          $stmt = $db->prepare("INSERT INTO auth_users (email, password, username, status, verified, resettable, roles_mask, registered, force_logout) VALUES (?, ?, ?, 0, 1, 1, 1, ?, 0)");
          $time = time();
          $stmt->bind_param('sssi', $email, $hash, $user, $time);
          $stmt->execute();

          $stmt = $db->prepare("INSERT INTO nuke_users (username, user_email, user_ibl_team, user_password, name, user_avatar, bio, ublock, theme, user_regdate) VALUES (?, ?, 'Metros', ?, 'CI Test User', '', '', '', '', NOW())");
          $stmt->bind_param('sss', $user, $email, $hash);
          $stmt->execute();

          $stmt = $db->prepare("UPDATE ibl_team_info SET gm_username = ? WHERE team_name = 'Metros'");
          $stmt->bind_param('s', $user);
          $stmt->execute();

          $db->close();
          echo "Test user created: $user\n";
          PHPSCRIPT

      # --- Run Tests ---
      # Visual regression runs in its own job — before functional E2E tests which modify
      # the database (trades, waivers, etc.) and would invalidate the baselines.
      - name: Wait for Playwright image
        run: |
          while ! docker image inspect mcr.microsoft.com/playwright:v1.58.2-jammy >/dev/null 2>&1; do
            echo "Waiting for Playwright image pull..."
            sleep 2
          done
          echo "Playwright image ready"

      - name: Run visual regression tests
        id: visual-regression
        continue-on-error: ${{ contains(github.event.pull_request.labels.*.name, 'update-baselines') }}
        env:
          IBL_TEST_USER: ${{ secrets.IBL_TEST_USER }}
          IBL_TEST_PASS: ${{ secrets.IBL_TEST_PASS }}
        run: |
          docker run --rm \
            --network ibl5-e2e \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}/ibl5:/ibl5" \
            -w /ibl5 \
            -e "BASE_URL=http://php/ibl5/" \
            -e "IBL_TEST_USER=$IBL_TEST_USER" \
            -e "IBL_TEST_PASS=$IBL_TEST_PASS" \
            -e "HOME=/tmp" \
            mcr.microsoft.com/playwright:v1.58.2-jammy \
            npx playwright test --config=playwright.visual.config.ts

      # --- Auto-update baselines when label is present ---
      - name: Regenerate visual regression baselines
        if: steps.visual-regression.outcome == 'failure' && contains(github.event.pull_request.labels.*.name, 'update-baselines')
        env:
          IBL_TEST_USER: ${{ secrets.IBL_TEST_USER }}
          IBL_TEST_PASS: ${{ secrets.IBL_TEST_PASS }}
        run: |
          docker run --rm \
            --network ibl5-e2e \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}/ibl5:/ibl5" \
            -w /ibl5 \
            -e "BASE_URL=http://php/ibl5/" \
            -e "IBL_TEST_USER=$IBL_TEST_USER" \
            -e "IBL_TEST_PASS=$IBL_TEST_PASS" \
            -e "HOME=/tmp" \
            mcr.microsoft.com/playwright:v1.58.2-jammy \
            npx playwright test --config=playwright.visual.config.ts --update-snapshots

      - name: Commit and push updated baselines
        if: steps.visual-regression.outcome == 'failure' && contains(github.event.pull_request.labels.*.name, 'update-baselines')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ibl5/tests/e2e/smoke/visual-regression.spec.ts-snapshots/
          if git diff --cached --quiet; then
            echo "No baseline changes detected"
          else
            git commit -m "test: update visual regression baselines [auto]"
            git push
          fi

      - name: Remove update-baselines label
        if: always() && contains(github.event.pull_request.labels.*.name, 'update-baselines')
        env:
          GH_TOKEN: ${{ secrets.CI_PAT }}
        run: gh pr edit ${{ github.event.pull_request.number }} --remove-label update-baselines

      - name: Upload visual regression report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: visual-regression-report
          path: ibl5/test-results/
          retention-days: 7

      - name: Upload visual regression JSON and screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: visual-regression-results
          path: |
            ibl5/test-results.json
            ibl5/test-results/
          retention-days: 1

      - name: Stop Docker containers
        if: always()
        run: docker compose -f docker-compose.ci.yml down

  e2e-shards:
    name: E2E Tests (shard ${{ matrix.shard-index }}/${{ matrix.total-shards }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard-index: [1, 2, 3]
        total-shards: [3]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      # --- Dependency Caching ---
      - name: Cache vendor directory
        uses: actions/cache@v5
        with:
          path: ibl5/vendor
          key: ${{ runner.os }}-vendor-${{ hashFiles('ibl5/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-vendor-

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: ibl5/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('ibl5/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install JS dependencies
        working-directory: ibl5
        run: bun install

      - name: Install Composer dependencies
        working-directory: ibl5
        run: composer install --no-interaction --no-progress --prefer-dist --ignore-platform-reqs

      # --- App Setup ---
      - name: Create config.php
        working-directory: ibl5
        run: |
          cat > config.php <<'PHPCFG'
          <?php
          if (realpath(__FILE__) === realpath($_SERVER['SCRIPT_FILENAME'])) {
              header("Location: index.php");
              exit();
          }
          $display_errors = true;
          $dbhost = getenv('DB_HOST') ?: '127.0.0.1';
          $dbuname = 'root';
          $dbpass = 'root';
          $dbname = 'ibl5';
          $prefix = 'nuke';
          $user_prefix = 'nuke';
          $dbtype = 'MySQL';
          $sitekey = 'ci-test-key-not-secret';
          $subscription_url = '';
          $admin_file = 'admin';
          PHPCFG

      - name: Build CSS
        working-directory: ibl5
        run: bunx @tailwindcss/cli -i design/input.css -o themes/IBL/style/style.css

      # --- Docker Compose ---
      - name: Pull or build PHP image
        run: |
          docker pull ghcr.io/a-jay85/ibl5/php-apache:latest || \
          docker build -t ghcr.io/a-jay85/ibl5/php-apache:latest .

      - name: Start Docker containers
        run: docker compose -f docker-compose.ci.yml up -d --wait

      - name: Pull Playwright image (background)
        run: nohup docker pull mcr.microsoft.com/playwright:v1.58.2-jammy > /tmp/playwright-pull.log 2>&1 &

      # --- Database Setup ---
      - name: Create database and apply migrations
        run: |
          chmod +x ibl5/bin/run-migrations-ci.sh
          ibl5/bin/run-migrations-ci.sh -h 127.0.0.1 -u root -proot ibl5

      - name: Import seed data
        run: |
          docker compose -f docker-compose.ci.yml exec -T mariadb \
            mariadb -u root -proot ibl5 < ibl5/tests/e2e/fixtures/ci-seed.sql

      - name: Create test user
        env:
          IBL_TEST_USER: ${{ secrets.IBL_TEST_USER }}
          IBL_TEST_PASS: ${{ secrets.IBL_TEST_PASS }}
        run: |
          docker compose -f docker-compose.ci.yml exec \
            -e IBL_TEST_USER="$IBL_TEST_USER" \
            -e IBL_TEST_PASS="$IBL_TEST_PASS" \
            -T php php <<'PHPSCRIPT'
          <?php
          $hash = password_hash(getenv('IBL_TEST_PASS'), PASSWORD_BCRYPT);
          $user = getenv('IBL_TEST_USER');
          $email = 'ci-test@example.com';
          $db = new mysqli('mariadb', 'root', 'root', 'ibl5');

          // roles_mask = 1 grants ADMIN role (Delight\Auth\Role::ADMIN)
          // Required for admin page E2E tests (updateAllTheThings.php, block.php)
          $stmt = $db->prepare("INSERT INTO auth_users (email, password, username, status, verified, resettable, roles_mask, registered, force_logout) VALUES (?, ?, ?, 0, 1, 1, 1, ?, 0)");
          $time = time();
          $stmt->bind_param('sssi', $email, $hash, $user, $time);
          $stmt->execute();

          $stmt = $db->prepare("INSERT INTO nuke_users (username, user_email, user_ibl_team, user_password, name, user_avatar, bio, ublock, theme, user_regdate) VALUES (?, ?, 'Metros', ?, 'CI Test User', '', '', '', '', NOW())");
          $stmt->bind_param('sss', $user, $email, $hash);
          $stmt->execute();

          $stmt = $db->prepare("UPDATE ibl_team_info SET gm_username = ? WHERE team_name = 'Metros'");
          $stmt->bind_param('s', $user);
          $stmt->execute();

          $db->close();
          echo "Test user created: $user\n";
          PHPSCRIPT

      # --- Run Sharded Tests ---
      - name: Wait for Playwright image
        run: |
          while ! docker image inspect mcr.microsoft.com/playwright:v1.58.2-jammy >/dev/null 2>&1; do
            echo "Waiting for Playwright image pull..."
            sleep 2
          done
          echo "Playwright image ready"

      - name: Run E2E tests (shard ${{ matrix.shard-index }}/${{ matrix.total-shards }})
        env:
          IBL_TEST_USER: ${{ secrets.IBL_TEST_USER }}
          IBL_TEST_PASS: ${{ secrets.IBL_TEST_PASS }}
        run: |
          docker run --rm \
            --network ibl5-e2e \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}/ibl5:/ibl5" \
            -w /ibl5 \
            -e "BASE_URL=http://php/ibl5/" \
            -e "IBL_TEST_USER=$IBL_TEST_USER" \
            -e "IBL_TEST_PASS=$IBL_TEST_PASS" \
            -e "HOME=/tmp" \
            mcr.microsoft.com/playwright:v1.58.2-jammy \
            npx playwright test \
              --shard=${{ matrix.shard-index }}/${{ matrix.total-shards }} \
              --reporter=blob

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: blob-report-${{ matrix.shard-index }}
          path: ibl5/blob-report/
          retention-days: 1

      - name: Upload shard test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-shard-${{ matrix.shard-index }}
          path: ibl5/test-results/
          retention-days: 1

      - name: Stop Docker containers
        if: always()
        run: docker compose -f docker-compose.ci.yml down

  merge-reports:
    name: Merge E2E Reports
    needs: [e2e, e2e-shards]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install JS dependencies
        working-directory: ibl5
        run: bun install

      - name: Download blob reports
        uses: actions/download-artifact@v8
        with:
          pattern: blob-report-*
          path: ibl5/all-blob-reports
          merge-multiple: true

      - name: Download visual regression results
        if: always()
        uses: actions/download-artifact@v8
        with:
          name: visual-regression-results
          path: ibl5/visual-results/
        continue-on-error: true

      - name: Download shard test results
        if: always()
        uses: actions/download-artifact@v8
        with:
          pattern: test-results-shard-*
          path: ibl5/shard-test-results/
          merge-multiple: true
        continue-on-error: true

      - name: Merge reports
        working-directory: ibl5
        run: |
          npx playwright merge-reports --reporter=html ./all-blob-reports
          npx playwright merge-reports --reporter=json ./all-blob-reports > test-results.json

      - name: Upload merged report
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: ibl5/playwright-report/
          retention-days: 7

      - name: Restore CML cache
        if: always() && github.event_name == 'pull_request'
        uses: actions/cache@v5
        with:
          path: ~/.cml
          key: ${{ runner.os }}-cml-0.20.6

      - name: Install CML (fallback if cache miss)
        if: always() && github.event_name == 'pull_request'
        run: |
          if [ ! -f ~/.cml/node_modules/.bin/cml ]; then
            npm install --prefix ~/.cml @dvcorg/cml@0.20.6
          fi
          echo "$HOME/.cml/node_modules/.bin" >> $GITHUB_PATH

      - name: Generate E2E report with screenshots
        if: always() && github.event_name == 'pull_request'
        working-directory: ibl5
        run: |
          node ../.github/scripts/summarize-e2e-results.mjs \
            --visual=visual-results/test-results.json \
            --visual-screenshots=visual-results/test-results/ \
            --functional=test-results.json \
            --functional-screenshots=shard-test-results/ \
            --artifact-url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            > /tmp/e2e-comment.md

      - name: Post E2E results to PR
        if: always() && github.event_name == 'pull_request'
        working-directory: ibl5
        env:
          REPO_TOKEN: ${{ github.token }}
        run: cml comment update --target=pr --publish /tmp/e2e-comment.md
