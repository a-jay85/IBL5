# Minimal Docker Compose for CI E2E tests.
# No Traefik, Mailpit, Adminer, persistent volumes, or external networks.

networks:
  default:
    name: ibl5-e2e

services:
  mariadb:
    image: mariadb:10.6
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: ibl5
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  php:
    image: ghcr.io/a-jay85/ibl5/php-apache:latest
    environment:
      DB_HOST: mariadb
      E2E_TESTING: 1
    volumes:
      - ./ibl5:/var/www/html/ibl5
    ports:
      - "8080:80"
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/ibl5/"]
      interval: 5s
      timeout: 5s
      retries: 10
