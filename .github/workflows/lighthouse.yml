name: Lighthouse CI

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [master]
    paths:
      - '**.php'
      - '**.css'
      - '**.ts'
      - '**.js'
      - 'ibl5/design/**'
      - 'ibl5/migrations/**.sql'
      - 'Dockerfile'
      - 'docker-compose*.yml'
      - '.github/workflows/lighthouse.yml'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      src: ${{ github.event.pull_request.user.login == 'dependabot[bot]' || steps.filter.outputs.src == 'true' }}
    steps:
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            src:
              - '**.php'
              - '**.css'
              - '**.ts'
              - '**.js'
              - 'ibl5/design/**'
              - 'ibl5/migrations/**.sql'
              - 'Dockerfile'
              - 'docker-compose*.yml'
              - '.github/workflows/lighthouse.yml'

  lighthouse:
    name: Performance Audit
    needs: [changes]
    if: |
      always() &&
      (github.event_name == 'push' || needs.changes.outputs.src == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      # --- Dependency Caching ---
      - name: Cache vendor directory
        uses: actions/cache@v5
        with:
          path: ibl5/vendor
          key: ${{ runner.os }}-vendor-${{ hashFiles('ibl5/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-vendor-

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: ibl5/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('ibl5/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        working-directory: ibl5
        run: |
          composer install --no-interaction --no-progress --prefer-dist --ignore-platform-reqs
          bun install

      # --- Docker E2E Setup ---
      - uses: ./.github/actions/setup-docker-e2e
        with:
          build-css: 'true'

      # --- Lighthouse ---
      - name: Run Lighthouse CI
        working-directory: ibl5
        run: bunx @lhci/cli autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
          CHROME_PATH: /usr/bin/google-chrome-stable

      - name: Download master baseline
        id: baseline
        if: always()
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          workflow: lighthouse-baseline.yml
          branch: master
          name: lighthouse-baseline-manifest
          path: ibl5/baseline/
          if_no_artifact_found: warn

      - name: Generate PR comment
        id: comment
        if: always()
        working-directory: ibl5
        run: |
          BASELINE_FLAG=""
          if [[ -f baseline/manifest.json ]]; then
            BASELINE_FLAG="--baseline=baseline/manifest.json"
          fi
          ../bin/lighthouse-comment \
            --manifest=.lighthouseci/manifest.json \
            --links=.lighthouseci/links.json \
            $BASELINE_FLAG \
            --out=.lighthouseci/comment.md || true

      - name: Post sticky PR comment
        if: always() && github.event_name == 'pull_request' && hashFiles('ibl5/.lighthouseci/comment.md') != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: lighthouse-comment
          path: ibl5/.lighthouseci/comment.md

      - name: Publish to job summary (master push)
        if: always() && github.event_name == 'push' && hashFiles('ibl5/.lighthouseci/comment.md') != ''
        run: cat ibl5/.lighthouseci/comment.md >> "$GITHUB_STEP_SUMMARY"

      # --- Cleanup ---
      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.ci.yml down --volumes
