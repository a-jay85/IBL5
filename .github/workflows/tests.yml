name: Tests and Analysis

on:
  push:
    branches: [ master, develop ]
    paths:
      - '**.php'
      - 'ibl5/migrations/**.sql'
      - 'bin/**'
      - 'ibl5/bin/**'
  pull_request:
    branches: [ master, develop ]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      pull-requests: read
    outputs:
      src: ${{ github.event_name == 'push' || github.event.pull_request.user.login == 'dependabot[bot]' || steps.filter.outputs.src == 'true' }}
      shell: ${{ github.event_name == 'push' || github.event.pull_request.user.login == 'dependabot[bot]' || steps.filter.outputs.shell == 'true' }}
      ibl6: ${{ github.event_name == 'push' || github.event.pull_request.user.login == 'dependabot[bot]' || steps.filter.outputs.ibl6 == 'true' }}
    steps:
      - uses: dorny/paths-filter@v4
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: |
            src:
              - '**.php'
              - 'ibl5/migrations/**.sql'
              - 'ibl5/composer.json'
              - 'ibl5/composer.lock'
              - 'ibl5/phpunit.xml'
              - 'ibl5/phpstan.neon'
              - 'ibl5/phpstan-tests.neon'
              - 'ibl5/phpstan-tests-baseline.neon'
              - 'ibl5/phpstan-rules/**'
              - 'ibl5/tests/DatabaseIntegration/Fixtures/**'
              - '.github/workflows/tests.yml'
            shell:
              - 'bin/**'
              - 'ibl5/bin/**'
              - '.github/workflows/tests.yml'
              # bin/test-postplan-arm-conditions reads the Phase 6.5 condition
              # blocks here, so a SKILL.md-only edit must run the harness job.
              - '.claude/skills/post-plan/SKILL.md'
              # bin/test-post-review-findings reads the Step 7 / Step 1 blocks here,
              # so a command-only edit must run the harness job too.
              - '.claude/commands/pr-review.md'
              - '.claude/commands/security-audit.md'
              # bin/test-human-signoff-classifier guards the classifier lib that
              # human-signoff.yml sources, so a workflow-only edit must run it too.
              - '.github/workflows/human-signoff.yml'
            ibl6:
              - 'IBL6/**'
              - '.github/workflows/tests.yml'

  test:
    name: PHPUnit Tests
    needs: [changes]
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    strategy:
      matrix:
        php-version: ['8.5']

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Setup PHP environment
      uses: ./.github/actions/setup-php-env
      with:
        php-version: ${{ matrix.php-version }}
        extensions: mbstring, intl, pcov
        coverage: pcov

    - name: Run PHPUnit tests with coverage
      working-directory: ibl5
      run: |
        mkdir -p coverage
        echo "::group::Full PHPUnit output"
        set +eo pipefail
        vendor/bin/phpunit \
          --testdox \
          --coverage-clover coverage/clover.xml \
          --colors=always 2>&1 | tee /tmp/phpunit-output.txt
        PHPUNIT_EXIT=${PIPESTATUS[0]}
        set -eo pipefail
        echo "::endgroup::"

        if [ $PHPUNIT_EXIT -ne 0 ]; then
          echo ""
          echo "════════════════════════════════════════"
          echo "  FAILURE SUMMARY"
          echo "════════════════════════════════════════"
          sed 's/\x1b\[[0-9;]*m//g' /tmp/phpunit-output.txt | awk '/✔/{show=0} /✘/{show=1} show' || true
          echo ""
          sed 's/\x1b\[[0-9;]*m//g' /tmp/phpunit-output.txt | awk '/^FAILURES!$/,0' || true
          echo "════════════════════════════════════════"
        fi
        exit $PHPUNIT_EXIT

    - name: Check coverage threshold
      working-directory: ibl5
      run: php bin/check-coverage coverage/clover.xml 80

    - name: Check coverage regression
      working-directory: ibl5
      run: php bin/check-coverage-regression coverage/clover.xml coverage-baseline.json

    - name: Check if threshold needs ratcheting
      working-directory: ibl5
      run: |
        THRESHOLD=80
        BUFFER=5
        COVERAGE=$(php -r '
          $xml = simplexml_load_file("coverage/clover.xml");
          $m = $xml->xpath("/coverage/project/metrics")[0];
          echo round((int)$m["coveredstatements"] / (int)$m["statements"] * 100, 2);
        ')
        GAP=$(echo "$COVERAGE - $THRESHOLD" | bc)
        if (( $(echo "$GAP > $BUFFER" | bc -l) )); then
          NEW_THRESHOLD=$(echo "$COVERAGE - 2" | bc | cut -d. -f1)
          echo "::warning::Coverage is ${COVERAGE}%, threshold is ${THRESHOLD}%. Consider ratcheting to ${NEW_THRESHOLD}% in .github/workflows/tests.yml"
        fi

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report
        path: ibl5/coverage/
        retention-days: 7

  audit-php:
    name: PHP Dependency Audit
    needs: [changes]
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Setup PHP environment
      uses: ./.github/actions/setup-php-env
      with:
        extensions: ''
        create-config: 'false'

    - name: Audit PHP dependencies
      working-directory: ibl5
      run: composer audit

  audit-js:
    name: JS Dependency Audit
    needs: [changes]
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: '22'

    - name: Audit JS dependencies
      working-directory: ibl5
      run: npm audit --audit-level=high

  ibl6-checks:
    name: IBL6 Type Check & Unit Tests
    needs: [changes]
    if: needs.changes.outputs.ibl6 == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: IBL6/package-lock.json

    - name: Install dependencies
      working-directory: IBL6
      run: npm ci

    - name: Type check (svelte-check)
      working-directory: IBL6
      run: npm run check

    # vite.config forces vitest browser mode (provider: playwright, chromium),
    # so the runner needs the browser binary before test:unit.
    - name: Cache Playwright browsers
      uses: actions/cache@v6
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('IBL6/package-lock.json') }}
        restore-keys: |
          playwright-${{ runner.os }}-

    - name: Install Playwright Chromium
      working-directory: IBL6
      run: npx playwright install chromium --with-deps

    - name: Unit tests (vitest)
      working-directory: IBL6
      run: npm run test:unit -- --run

  db-integration:
    name: Database Integration Tests
    needs: [changes]
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: ibl5
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Setup PHP environment
      uses: ./.github/actions/setup-php-env

    - name: Apply migrations
      working-directory: ibl5
      run: bin/run-migrations-ci.sh -h 127.0.0.1 -u root -proot ibl5

    - name: Import seed data
      working-directory: ibl5
      run: mysql -h 127.0.0.1 -u root -proot ibl5 < tests/DatabaseIntegration/Fixtures/db-seed.sql

    - name: Run database integration tests
      working-directory: ibl5
      env:
        DB_HOST: 127.0.0.1
        DB_USER: root
        DB_PASS: root
        DB_NAME: ibl5
      run: vendor/bin/phpunit --group database --no-progress --no-output --testdox-summary

  phpstan:
    name: PHPStan Analysis
    needs: [changes]
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Setup PHP environment
      uses: ./.github/actions/setup-php-env
      with:
        create-config: 'false'

    - name: Cache PHPStan result cache
      uses: actions/cache@v6
      with:
        path: |
          ibl5/tmp
          ibl5/tmp-tests
        key: phpstan-${{ hashFiles('ibl5/phpstan.neon', 'ibl5/phpstan-tests.neon', 'ibl5/phpstan-rules/**') }}
        restore-keys: |
          phpstan-

    - name: Run PHPStan
      working-directory: ibl5
      run: composer run analyse

    - name: Run PHPStan (tests)
      working-directory: ibl5
      run: composer run analyse:tests

    - name: Check baseline drift
      working-directory: ibl5
      run: php bin/check-baseline-drift

  phpunit-hygiene:
    name: PHPUnit hygiene gate
    needs: [changes]
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Ban silently-disabled tests (markTestSkipped)
        run: bin/check-phpunit-hygiene --pr

  shellcheck:
    name: ShellCheck (bash 3.2 compat)
    needs: [changes]
    if: needs.changes.outputs.shell == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run shellcheck on bin/**
        run: |
          set -e
          # Find shell scripts: files with .sh extension OR bash/sh shebang
          mapfile -t scripts < <(
            {
              find bin ibl5/bin -type f -name '*.sh' 2>/dev/null || true
              find bin ibl5/bin -type f -not -name '*.sh' 2>/dev/null \
                | while read -r f; do
                    head -c 40 "$f" 2>/dev/null | grep -qE '^#!(/usr)?/bin/(ba)?sh' && echo "$f"
                  done
            } | sort -u
          )

          if [ ${#scripts[@]} -eq 0 ]; then
            echo "No shell scripts found — nothing to check."
            exit 0
          fi

          echo "Checking ${#scripts[@]} shell scripts with --severity=warning..."
          printf '  %s\n' "${scripts[@]}"
          echo ""

          # --severity=warning catches SC3044 (declare -A unsupported in bash 3.2)
          # and other portability issues. -s bash targets bash specifically; scripts
          # must work in bash 3.2 (macOS default shell).
          #
          # Excludes for pre-existing warnings, tracked as burn-down debt:
          #   SC2034 — unused variables (bin/lib/wt-guards.sh)
          #   SC1090 — non-const source (db-sync-prod, log-fetch-prod
          #            source dynamic .env file)
          #   SC2207 — array splitting suggestion (ibl5/bin/run-migrations-ci.sh:20,
          #            CI-only script, suggestion uses bash 4 mapfile)
          # Bash portability checks (SC3xxx) remain fully enforced.
          shellcheck --severity=warning --shell=bash \
            --exclude=SC2034,SC1090,SC2207 \
            "${scripts[@]}"

  host-mariadb-guard:
    name: Host mariadb grep guard
    needs: [changes]
    if: needs.changes.outputs.shell == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Grep for host mariadb invocations outside bin/db-query
        run: |
          set -e
          # Worktrees run a separate dockerized MariaDB per worktree. Calling the host
          # `mariadb` client with -h 127.0.0.1 bypasses worktree isolation and will read
          # or mutate the wrong database. Only bin/db-query is allowed to do this because
          # it hands off to docker exec internally.
          offenders=$(
            grep -rEn '^[[:space:]]*mariadb[[:space:]]+(-h[[:space:]]*127|-u[[:space:]]*root)' \
              bin/ ibl5/bin/ 2>/dev/null \
              | grep -v -E '(bin/db-query|\.md|tests\.yml)' \
              || true
          )

          if [ -n "$offenders" ]; then
            echo "FAIL: direct host mariadb invocations found in shell scripts."
            echo ""
            echo "$offenders"
            echo ""
            echo "Worktrees have isolated dockerized MariaDB instances. Use bin/db-query"
            echo "or 'docker exec <container> mariadb ...' instead of calling the host client."
            exit 1
          fi

          echo "OK: no host mariadb invocations found outside bin/db-query."

  automouse-impl-model-test:
    name: Automouse impl-model parser test
    needs: [changes]
    if: needs.changes.outputs.shell == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Run automouse impl-model parser regression test
        run: bin/test-automouse-impl-model
      - name: Run automouse env-breaker regression test
        run: bin/test-automouse-env-breaker

  update-baselines:
    name: Update coverage & PHPStan baselines
    needs: [test, phpstan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v7
      with:
        token: ${{ secrets.CI_PAT }}

    - name: Setup PHP environment
      uses: ./.github/actions/setup-php-env
      with:
        extensions: mbstring, intl

    - name: Download coverage report
      uses: actions/download-artifact@v8
      with:
        name: coverage-report
        path: ibl5/coverage/

    - name: Update coverage baseline
      working-directory: ibl5
      run: |
        COVERAGE=$(php -r '
          $xml = simplexml_load_file("coverage/clover.xml");
          $m = $xml->xpath("/coverage/project/metrics")[0];
          echo round((int)$m["coveredstatements"] / (int)$m["statements"] * 100, 2);
        ')
        TOLERANCE=$(php -r '
          $json = file_get_contents("coverage-baseline.json");
          $data = json_decode($json, true);
          echo $data["tolerance"] ?? "0.5";
        ')
        php -r '
          echo json_encode([
              "percentage" => (float) $argv[1],
              "tolerance" => (float) $argv[2],
          ], JSON_PRETTY_PRINT) . "\n";
        ' "$COVERAGE" "$TOLERANCE" > coverage-baseline.json

    - name: Update PHPStan baseline counts
      working-directory: ibl5
      run: php bin/check-baseline-drift --update

    - name: Commit updated baselines
      working-directory: ibl5
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add coverage-baseline.json phpstan-baseline-counts.json
        if git diff --cached --quiet; then
          echo "No baseline changes detected"
        else
          git commit -m "ci: update coverage & PHPStan baseline snapshots [auto]"
          git push
        fi

  static-guards:
    name: Static guards
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Folds three unconditional micro-guards into one sequential job to save runner
    # startup overhead (mirrors the PR #1269 meta-checks fold). NO `if:` and NO
    # `needs:` — every check below runs unconditionally because none is covered by a
    # path-filter, so gating on `src`/`shell` would skip exactly when the bug lands.
    # Each check is a few seconds of grep/bash with no dependencies.
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      # infection-excludes: a stale exclude can be introduced by editing
      # ibl5/infection.json5 alone, which no path-filter covers.
      - name: Check infection.json5 file excludes resolve
        working-directory: ibl5
        run: bin/check-infection-excludes
      # csrf-field-name: a wrong CSRF field name (name="csrf_token" without the
      # leading underscore) silently rejects every form submission and is invisible
      # to PHPStan/tests.
      - name: Check CSRF form field names
        working-directory: ibl5
        run: bin/check-csrf-field-name
      # workflow-lint: a job that `uses:` a local ./.github/actions/* action without
      # a prior checkout fails only at runtime, and a composite that drops a pinned
      # behavior contract fails silently. NOTE: NO working-directory — these scripts
      # live in repo-root bin/ and scan repo-root .github/.
      - name: Local-action checkout ordering
        run: bin/check-workflow-checkout
      - name: Composite behavior contracts
        run: bin/check-composite-contracts

  harness-tests:
    name: Shell harness regression tests
    needs: [changes]
    if: needs.changes.outputs.shell == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Each harness builds its own throwaway git repos under mktemp, so the
    # checkout depth and a global git identity are irrelevant.
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: bin/test-cleanup-safety
        run: bin/test-cleanup-safety
      - name: bin/test-check-pr-collisions
        run: bin/test-check-pr-collisions
      - name: bin/test-check-phpunit-hygiene
        run: bin/test-check-phpunit-hygiene
      - name: bin/test-refactor-flag
        run: bin/test-refactor-flag
      - name: bin/test-automouse-queue
        run: bin/test-automouse-queue
      - name: bin/test-automouse-self-heal
        run: bin/test-automouse-self-heal
      - name: bin/test-automouse-concurrency
        run: bin/test-automouse-concurrency
      - name: bin/test-automouse-stream-filter
        run: bin/test-automouse-stream-filter
      - name: bin/test-wt-status
        run: bin/test-wt-status
      - name: bin/test-check-plan
        run: bin/test-check-plan
      - name: bin/test-check-plan-staleness
        run: bin/test-check-plan-staleness
      - name: bin/test-adr-check
        run: bin/test-adr-check
      - name: bin/test-postplan-arm-conditions
        run: bin/test-postplan-arm-conditions
      - name: bin/test-post-review-findings
        run: bin/test-post-review-findings
      - name: bin/test-human-signoff-classifier
        run: bin/test-human-signoff-classifier
      - name: bin/test-playwright-version
        run: bin/test-playwright-version
      - name: bin/test-pr-canary-check
        run: bin/test-pr-canary-check
      - name: bin/test-check-workflow-checkout
        run: bin/test-check-workflow-checkout
      - name: bin/test-check-composite-contracts
        run: bin/test-check-composite-contracts
      - name: bin/test-check-e2e-mutator-isolation
        run: bin/test-check-e2e-mutator-isolation
      - name: bin/test-check-e2e-fixture-drift
        run: bin/test-check-e2e-fixture-drift
      - name: bin/test-website-affecting
        run: bin/test-website-affecting

  gate:
    name: Tests and Analysis
    if: always()
    needs: [changes, test, audit-php, audit-js, ibl6-checks, db-integration, phpstan, phpunit-hygiene, shellcheck, host-mariadb-guard, automouse-impl-model-test, update-baselines, static-guards, harness-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - run: exit 1
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
