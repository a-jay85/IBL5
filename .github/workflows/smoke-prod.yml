name: Production Smoke Test

on:
  # Run after deploy completes
  workflow_run:
    workflows: ["Build and Deploy"]
    types: [completed]

  # Manual trigger
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL to test'
        default: 'https://www.iblhoops.net'

  # Daily health check at 8am UTC
  schedule:
    - cron: '0 8 * * *'

permissions:
  contents: read

env:
  BASE_URL: ${{ github.event.inputs.base_url || 'https://www.iblhoops.net' }}

concurrency:
  # Shared with main.yml so a new deploy can't race an in-flight smoke run.
  group: production-deploy
  cancel-in-progress: false

jobs:
  smoke:
    name: Production Health Check
    runs-on: ubuntu-latest
    # Skip if triggered by a failed deploy
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    timeout-minutes: 5
    outputs:
      # 'false' on skip paths (stale guard) because skipped != failure
      ibl6_failed: ${{ steps.ibl6.outcome == 'failure' }}
      # 'true' when the IBL5 smoke was INCONCLUSIVE — either the on-box prober
      # hit a uniform WAF-class block (remote exit 3) or the production box was
      # unreachable over SSH (exit 255). Routes to notify-inconclusive instead
      # of gating auto-rollback.
      ibl5_inconclusive: ${{ steps.ibl5.outputs.inconclusive }}
      # Why: 'waf' (remote uniform WAF-class block) or 'ssh-unreachable'
      # (could not reach the production box). Selects the inconclusive DM text.
      ibl5_inconclusive_reason: ${{ steps.ibl5.outputs.inconclusive_reason }}

    steps:
      - uses: actions/checkout@v6

      # Back-to-back deploys each fire a workflow_run. The earlier smoke is
      # then stale AND burns requests against LiteSpeed's per-IP WAF counter,
      # which can trip a ban that makes the later smoke fail with blanket 415s.
      - name: Skip if production tip has advanced past this SHA
        id: guard
        if: github.event_name == 'workflow_run'
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_SHA: ${{ github.event.workflow_run.head_sha }}
          REPO: ${{ github.repository }}
        run: |
          if ! ACTUAL=$(gh api "repos/${REPO}/commits/production" --jq .sha 2>&1); then
            echo "::warning::Guard API call failed ($ACTUAL) — proceeding with smoke anyway"
            echo "stale=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$EXPECTED_SHA" != "$ACTUAL" ]; then
            echo "::notice::Stale smoke run — workflow_run sha=$EXPECTED_SHA but production tip=$ACTUAL. Skipping."
            echo "stale=true" >> "$GITHUB_OUTPUT"
          else
            echo "Fresh — production tip matches workflow_run sha ($EXPECTED_SHA)"
            echo "stale=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for server stabilization after deploy
        if: github.event_name == 'workflow_run' && steps.guard.outputs.stale != 'true'
        run: sleep 15

      # The gating IBL5 probe runs ON the production box over the same SSH
      # channel the notify jobs use, so the request originates from the box's
      # own (whitelisted) IP — never a foreign runner IP the per-IP WAF bans
      # (ADR-0039).
      - name: Setup SSH for on-box smoke
        if: steps.guard.outputs.stale != 'true'
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p ${{ secrets.PORT }} ${{ secrets.HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
        env:
          DEPLOY_KEY: ${{ secrets.PRIVATE_KEY }}

      - name: Run IBL5 smoke checks on-box via SSH (gates auto-rollback)
        id: ibl5
        if: steps.guard.outputs.stale != 'true'
        run: |
          # Pipe bin/smoke-prod to `bash -s` on the production box (the script
          # isn't deployed) so it curls the public hostname from the box's OWN
          # egress IP — exercising the real vhost+cert+PHP stack while bypassing
          # the per-IP WAF that bans datacenter runners. (Loopback via
          # --resolve 127.0.0.1 was rejected: the box serves a non-matching
          # default-vhost cert there — see ADR-0039.) A real break (5xx / conn-
          # refused) is still heterogeneous and gates auto-rollback as before.
          #
          # bin/smoke-prod only ever exits 0/1/2/3, so 255 is unambiguously an
          # SSH-level failure (box/network unreachable):
          #   0   pass            -> step succeeds
          #   1   real failure    -> propagate, gates auto-rollback
          #   3   WAF-uniform     -> INCONCLUSIVE (notify-only, no rollback)
          #   255 box unreachable -> INCONCLUSIVE (reverting cannot fix an
          #                          unreachable box, and a redeploy needs it too)
          # The `< bin/smoke-prod` redirect lives INSIDE run_smoke so the
          # 255-retry re-opens stdin; outside it, the retry would feed empty
          # stdin to `bash -s` and silently "pass".
          run_smoke() {
            ssh -o ConnectTimeout=10 -p ${{ secrets.PORT }} -i ~/.ssh/id_deploy \
              ${{ secrets.USERNAME }}@${{ secrets.HOST }} \
              "env SMOKE_INTERCHECK_DELAY=0 bash -s -- --scope=ibl5 $BASE_URL" \
              < bin/smoke-prod
          }
          set +e
          run_smoke
          code=$?
          if [ "$code" -eq 255 ]; then
            echo "SSH unreachable (255) — retrying once after 5s"
            sleep 5
            run_smoke
            code=$?
          fi
          set -e
          if [ "$code" -eq 3 ]; then
            { echo "inconclusive=true"; echo "inconclusive_reason=waf"; } >> "$GITHUB_OUTPUT"
            exit 0
          elif [ "$code" -eq 255 ]; then
            { echo "inconclusive=true"; echo "inconclusive_reason=ssh-unreachable"; } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          exit "$code"

      - name: Run IBL6 smoke checks on-box via SSH (notify-only)
        id: ibl6
        if: steps.guard.outputs.stale != 'true'
        continue-on-error: true
        run: |
          # Pipe bin/smoke-prod to `bash -s` on the production box so it curls
          # the IBL6 hostname from the box's OWN whitelisted egress IP, bypassing
          # the per-IP WAF that bans datacenter runners (same mechanism as the
          # IBL5 step above — ADR-0039). bin/ is host/CI-only, hence the redirect.
          # Reuses the key written by "Setup SSH for on-box smoke" (no new setup).
          # Minimal form (no 255-retry like IBL5): IBL6 is a single notify-only
          # check, and the only new failure mode — SSH 255 (box unreachable) —
          # cannot create a spurious IBL6 DM, because IBL5 runs FIRST, hits 255,
          # and sets ibl5_inconclusive=true, which gates off notify-ibl6-degradation.
          ssh -o ConnectTimeout=10 -p ${{ secrets.PORT }} -i ~/.ssh/id_deploy \
            ${{ secrets.USERNAME }}@${{ secrets.HOST }} \
            "bash -s -- --scope=ibl6 $BASE_URL" \
            < bin/smoke-prod

  rollback-and-notify:
    name: Auto-Rollback and Notify
    runs-on: ubuntu-latest
    needs: smoke
    if: >-
      always() &&
      needs.smoke.result == 'failure' &&
      github.event_name == 'workflow_run'
    timeout-minutes: 5

    steps:
      - name: Checkout production branch
        uses: actions/checkout@v6
        with:
          ref: production
          fetch-depth: 2
          token: ${{ secrets.CI_PAT }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Check revert eligibility
        id: check
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          COMMIT_SHA=$(git log -1 --pretty=%H)
          echo "commit_sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"
          echo "commit_msg=$COMMIT_MSG" >> "$GITHUB_OUTPUT"

          # Loop-guard: never revert a revert (would ping-pong production).
          if echo "$COMMIT_MSG" | grep -q "^Revert "; then
            echo "should_revert=false" >> "$GITHUB_OUTPUT"
            echo "skip_reason=already-revert" >> "$GITHUB_OUTPUT"
            echo "HEAD is already a revert commit — skipping to prevent loop"
            exit 0
          fi

          # Docs-only guard: a deploy that changed only docs/markdown cannot
          # break runtime, so a smoke failure on it is never that commit's
          # fault. Defense-in-depth alongside the exit-3 inconclusive path,
          # for a non-uniform failure that coincides with a docs-only deploy.
          if [ "$(git cat-file -p HEAD | grep -c '^parent ')" -gt 1 ]; then
            DIFF_BASE="HEAD^1"
          else
            DIFF_BASE="HEAD~1"
          fi
          CHANGED=$(git diff --name-only "$DIFF_BASE" HEAD)
          NON_DOCS=$(echo "$CHANGED" | grep -vE '(\.md$|^docs/|^ibl5/docs/)' || true)
          if [ -n "$CHANGED" ] && [ -z "$NON_DOCS" ]; then
            echo "should_revert=false" >> "$GITHUB_OUTPUT"
            echo "skip_reason=docs-only" >> "$GITHUB_OUTPUT"
            echo "HEAD changed only docs/markdown — skipping revert"
            exit 0
          fi

          echo "should_revert=true" >> "$GITHUB_OUTPUT"
          echo "skip_reason=" >> "$GITHUB_OUTPUT"

      - name: Revert production commit
        id: revert
        if: steps.check.outputs.should_revert == 'true'
        continue-on-error: true
        run: |
          PARENT_COUNT=$(git cat-file -p HEAD | grep -c "^parent ")
          if [ "$PARENT_COUNT" -gt 1 ]; then
            git revert HEAD -m 1 --no-edit
          else
            git revert HEAD --no-edit
          fi
          git push origin production

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p ${{ secrets.PORT }} ${{ secrets.HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
        env:
          DEPLOY_KEY: ${{ secrets.PRIVATE_KEY }}

      - name: Send Discord DM
        env:
          COMMIT_MSG: ${{ steps.check.outputs.commit_msg }}
          COMMIT_SHA: ${{ steps.check.outputs.commit_sha }}
          SHOULD_REVERT: ${{ steps.check.outputs.should_revert }}
          SKIP_REASON: ${{ steps.check.outputs.skip_reason }}
          REVERT_OUTCOME: ${{ steps.revert.outcome }}
          OWNER_DISCORD_ID: ${{ secrets.OWNER_DISCORD_ID }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"

          if [ "$SHOULD_REVERT" = "false" ] && [ "$SKIP_REASON" = "docs-only" ]; then
            MSG=$(printf 'Production smoke test FAILED on a docs-only deploy (%s) — NOT reverting (cannot affect runtime). Likely transient/prober; please check.\n\nRun: %s' "$SHORT_SHA" "$RUN_URL")
          elif [ "$SHOULD_REVERT" = "false" ]; then
            MSG=$(printf 'Production smoke test FAILED but HEAD is already a revert — manual intervention required.\n\nCommit: %s\nRun: %s' "$SHORT_SHA" "$RUN_URL")
          elif [ "$REVERT_OUTCOME" = "failure" ]; then
            MSG=$(printf 'Production smoke test FAILED and auto-revert FAILED (push rejected?) — manual intervention required.\n\nCommit: %s\nRun: %s' "$SHORT_SHA" "$RUN_URL")
          else
            MSG=$(printf 'Production smoke test FAILED after deploy. Auto-reverted commit %s. A recovery deploy is in progress.\n\nReverted: %s\nRun: %s' "$SHORT_SHA" "$COMMIT_MSG" "$RUN_URL")
          fi

          PAYLOAD=$(jq -n --arg id "$OWNER_DISCORD_ID" --arg msg "$MSG" \
            '{content: {receivingUserDiscordID: $id, message: $msg}}')

          echo "$PAYLOAD" | ssh -p ${{ secrets.PORT }} -i ~/.ssh/id_deploy ${{ secrets.USERNAME }}@${{ secrets.HOST }} \
            'curl -s --max-time 10 -X POST http://localhost:50000/discordDM -H "Content-Type: application/json" -d @-' \
            || echo "IBLbot notification failed (bot may be down)"

  notify-scheduled-failure:
    name: Notify Scheduled Failure
    runs-on: ubuntu-latest
    needs: smoke
    if: >-
      always() &&
      needs.smoke.result == 'failure' &&
      github.event_name != 'workflow_run'
    timeout-minutes: 5

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p ${{ secrets.PORT }} ${{ secrets.HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
        env:
          DEPLOY_KEY: ${{ secrets.PRIVATE_KEY }}

      - name: Send Discord DM
        env:
          OWNER_DISCORD_ID: ${{ secrets.OWNER_DISCORD_ID }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TRIGGER="${{ github.event_name }}"
          MSG=$(printf 'Production smoke test FAILED (%s trigger — no auto-rollback).\n\nThis may be a transient issue. Check the run for details: %s' "$TRIGGER" "$RUN_URL")

          PAYLOAD=$(jq -n --arg id "$OWNER_DISCORD_ID" --arg msg "$MSG" \
            '{content: {receivingUserDiscordID: $id, message: $msg}}')

          echo "$PAYLOAD" | ssh -p ${{ secrets.PORT }} -i ~/.ssh/id_deploy ${{ secrets.USERNAME }}@${{ secrets.HOST }} \
            'curl -s --max-time 10 -X POST http://localhost:50000/discordDM -H "Content-Type: application/json" -d @-' \
            || echo "IBLbot notification failed (bot may be down)"

  notify-ibl6-degradation:
    name: Notify IBL6 Degradation
    runs-on: ubuntu-latest
    needs: smoke
    if: >-
      always() &&
      needs.smoke.outputs.ibl6_failed == 'true' &&
      needs.smoke.outputs.ibl5_inconclusive != 'true' &&
      needs.smoke.result == 'success'
    timeout-minutes: 5

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p ${{ secrets.PORT }} ${{ secrets.HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
        env:
          DEPLOY_KEY: ${{ secrets.PRIVATE_KEY }}

      - name: Send Discord DM
        env:
          OWNER_DISCORD_ID: ${{ secrets.OWNER_DISCORD_ID }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MSG=$(printf 'IBL6 smoke FAILED; IBL5 unaffected. No rollback.\n\nRun: %s' "$RUN_URL")

          PAYLOAD=$(jq -n --arg id "$OWNER_DISCORD_ID" --arg msg "$MSG" \
            '{content: {receivingUserDiscordID: $id, message: $msg}}')

          echo "$PAYLOAD" | ssh -p ${{ secrets.PORT }} -i ~/.ssh/id_deploy ${{ secrets.USERNAME }}@${{ secrets.HOST }} \
            'curl -s --max-time 10 -X POST http://localhost:50000/discordDM -H "Content-Type: application/json" -d @-' \
            || echo "IBLbot notification failed (bot may be down)"

  notify-inconclusive:
    name: Notify Smoke Inconclusive
    runs-on: ubuntu-latest
    needs: smoke
    # Fire ONLY when IBL5 smoke was inconclusive (on-box prober WAF-blocked, or
    # the box was unreachable over SSH). Both conjuncts are required: a plain
    # success lacks ibl5_inconclusive, and a real failure sets smoke.result ==
    # 'failure' (→ rollback path, not here).
    if: >-
      always() &&
      needs.smoke.outputs.ibl5_inconclusive == 'true' &&
      needs.smoke.result == 'success'
    timeout-minutes: 5

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p ${{ secrets.PORT }} ${{ secrets.HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
        env:
          DEPLOY_KEY: ${{ secrets.PRIVATE_KEY }}

      - name: Send Discord DM
        env:
          OWNER_DISCORD_ID: ${{ secrets.OWNER_DISCORD_ID }}
          INCONCLUSIVE_REASON: ${{ needs.smoke.outputs.ibl5_inconclusive_reason }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [ "$INCONCLUSIVE_REASON" = "ssh-unreachable" ]; then
            MSG=$(printf 'IBL5 smoke INCONCLUSIVE — could not reach the production box over SSH; deploy verdict unknown. NO rollback; production untouched — please check the host. Run: %s' "$RUN_URL")
          else
            MSG=$(printf 'IBL5 smoke INCONCLUSIVE (on-box prober hit a uniform WAF-class block). NO rollback; production untouched. Run: %s' "$RUN_URL")
          fi

          PAYLOAD=$(jq -n --arg id "$OWNER_DISCORD_ID" --arg msg "$MSG" \
            '{content: {receivingUserDiscordID: $id, message: $msg}}')

          echo "$PAYLOAD" | ssh -p ${{ secrets.PORT }} -i ~/.ssh/id_deploy ${{ secrets.USERNAME }}@${{ secrets.HOST }} \
            'curl -s --max-time 10 -X POST http://localhost:50000/discordDM -H "Content-Type: application/json" -d @-' \
            || echo "IBLbot notification failed (bot may be down)"
