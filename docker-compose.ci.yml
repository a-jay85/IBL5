# Minimal Docker Compose for CI E2E tests.
# No Traefik, Mailpit, Adminer, persistent volumes, or external networks.

networks:
  default:
    name: ibl5-e2e

services:
  mariadb:
    image: mariadb:10.11
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: ibl5
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  php:
    image: ghcr.io/a-jay85/ibl5/php-apache:latest
    environment:
      DB_HOST: mariadb
      E2E_TESTING: 1
      # Enables the out-of-band engine shadow spawn (ADR-0037). Safe stack-wide:
      # the run is detached/non-blocking, idempotent (per-game dedupe), and
      # flock-guarded against overlap; only the spawn E2E hits the update endpoint.
      ENGINE_SHADOW_ENABLED: "1"
    volumes:
      - ./ibl5:/var/www/html/ibl5
    ports:
      - "8080:80"
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/ibl5/"]
      interval: 5s
      timeout: 5s
      retries: 10

  ibl6:
    image: ghcr.io/a-jay85/ibl5/ibl6:latest
    build:
      context: .
      dockerfile: docker/Dockerfile.ibl6
    environment:
      DB_HOST: mariadb
      DB_NAME: ibl5
      DB_USER: root
      DB_PASSWORD: root
      NODE_ENV: production
      PORT: 3001
    depends_on:
      mariadb:
        condition: service_healthy
