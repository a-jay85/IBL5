  merge-reports:
    name: Merge E2E Reports
    needs: [changes, e2e, e2e-shards, e2e-mutators, api-e2e, ibl6-visual, ibl6-e2e]
    if: always() && needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Cache node_modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: node-modules-cache
        with:
          path: ibl5/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('ibl5/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install JS dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        working-directory: ibl5
        run: bun install

      - name: Download blob reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: blob-report-*
          path: ibl5/all-blob-reports
          merge-multiple: true

      - name: Download visual regression results
        if: always()
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: visual-regression-results
          path: ibl5/visual-results/
        continue-on-error: true

      - name: Download shard test results
        if: always()
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: test-results-shard-*
          path: ibl5/shard-test-results/
          merge-multiple: true
        continue-on-error: true

      - name: Merge reports
        working-directory: ibl5
        run: |
          npx playwright merge-reports --reporter=html ./all-blob-reports
          npx playwright merge-reports --reporter=json ./all-blob-reports > test-results.json

      - name: Upload merged report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: ibl5/playwright-report/
          retention-days: 7

      - name: Restore CML cache
        if: always() && github.event_name == 'pull_request'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cml
          key: ${{ runner.os }}-cml-0.20.6

      - name: Install CML (fallback if cache miss)
        if: always() && github.event_name == 'pull_request'
        run: |
          if [ ! -f ~/.cml/node_modules/.bin/cml ]; then
            npm install --prefix ~/.cml @dvcorg/cml@0.20.6
          fi
          echo "$HOME/.cml/node_modules/.bin" >> $GITHUB_PATH

      - name: Generate E2E report with screenshots
        if: always() && github.event_name == 'pull_request'
        working-directory: ibl5
        run: |
          node ../.github/scripts/summarize-e2e-results.mjs \
            --visual=visual-results/test-results.json \
            --visual-screenshots=visual-results/test-results/ \
            --functional=test-results.json \
            --functional-screenshots=shard-test-results/ \
            --artifact-url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            > /tmp/e2e-comment.md

      - name: Post E2E results to PR
        if: always() && github.event_name == 'pull_request'
        working-directory: ibl5
        env:
          REPO_TOKEN: ${{ github.token }}
        run: cml comment update --target=pr --publish /tmp/e2e-comment.md

  gate:
    name: E2E Tests
    if: always()
    needs: [changes, e2e, api-e2e, e2e-shards, e2e-mutators, ibl6-visual, ibl6-e2e]
    runs-on: ubuntu-latest
    steps:
      - run: exit 1
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')

  # Retention/cleanup for the per-SHA visual-review reports on gh-pages. Runs on
  # pushes to master (not on PRs, so it is NOT part of the `gate` required check)
  # and prunes per-SHA dirs whose newest commit is older than 14 days, keeping the
  # gh-pages branch from growing unbounded.
  vr-pages-cleanup:
    name: VR Pages retention cleanup
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout gh-pages (skip if it does not exist yet)
        id: checkout-pages
        continue-on-error: true
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Prune per-SHA report dirs older than 14 days
        if: steps.checkout-pages.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # A fresh checkout resets filesystem mtimes, so `find -mtime` is unreliable;
          # derive each per-SHA dir's age from its newest commit date instead.
          cutoff=$(( $(date +%s) - 14 * 86400 ))
          removed=0
          while IFS= read -r d; do
            ts=$(git log -1 --format=%ct -- "$d")
            if [ -n "$ts" ] && [ "$ts" -lt "$cutoff" ]; then
              git rm -rq "$d" && removed=$((removed + 1))
            fi
          done < <(find . -mindepth 1 -maxdepth 1 -type d -not -name '.git')
          if [ "$removed" -gt 0 ]; then
            git commit -m "chore(vr-pages): prune ${removed} per-SHA report dir(s) older than 14d"
            git push origin gh-pages
          else
            echo "Nothing to prune."
          fi
