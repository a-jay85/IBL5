name: Migration Safety

on:
  push:
    branches: [ master, develop ]
    paths:
      - 'ibl5/migrations/**.sql'
  pull_request:
    branches: [ master, develop ]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'ibl5/migrations/**.sql'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  idempotency-check:
    name: Bash/PHP Runner Idempotency
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: iblhoops_ibl5
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.5'
        extensions: mbstring, intl, mysqli
        coverage: none

    - name: Install dependencies
      working-directory: ibl5
      run: composer install --no-progress --no-interaction

    - name: Create config.php for CI
      working-directory: ibl5
      run: |
        cp config.php.example config.php
        sed -i "s/\$dbhost = getenv('DB_HOST') ?: 'localhost';/\$dbhost = '127.0.0.1';/" config.php
        sed -i "s/\$dbuname = \"iblhoops_\";/\$dbuname = \"root\";/" config.php
        sed -i "s/\$dbpass = \"password\";/\$dbpass = \"root\";/" config.php
        sed -i "s/\$dbname = \"iblhoops_\";/\$dbname = \"iblhoops_ibl5\";/" config.php

    - name: Apply migrations via bash runner
      run: ibl5/bin/run-migrations-ci.sh -h 127.0.0.1 -u root -proot iblhoops_ibl5

    - name: Seed PHP migration tracker
      working-directory: ibl5
      run: php bin/migrate-seed

    - name: Assert PHP runner sees nothing pending
      working-directory: ibl5
      run: |
        output=$(php bin/migrate --status)
        echo "$output"
        if [ "$output" != "Nothing to migrate." ]; then
          echo "FAIL: PHP runner has pending migrations after bash runner applied all."
          echo "This means the bash and PHP runners disagree on which files exist."
          exit 1
        fi

  schema-parity-check:
    name: Bash vs PHP Schema Parity
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.5'
        extensions: mbstring, intl, mysqli
        coverage: none

    - name: Install dependencies
      working-directory: ibl5
      run: composer install --no-progress --no-interaction

    - name: Create databases
      run: |
        mysql -h 127.0.0.1 -u root -proot -e "CREATE DATABASE ibl5_bash;"
        mysql -h 127.0.0.1 -u root -proot -e "CREATE DATABASE ibl5_php;"

    - name: "Bash path: apply all migrations"
      run: ibl5/bin/run-migrations-ci.sh -h 127.0.0.1 -u root -proot ibl5_bash

    - name: "PHP path: apply baseline via mysql client, then PHP runner for the rest"
      working-directory: ibl5
      run: |
        # Apply baseline schema via mysql client (same as bash would)
        sed 's/DEFINER=`[^`]*`@`[^`]*`//g' migrations/000_baseline_schema.sql \
          | mysql -h 127.0.0.1 -u root -proot ibl5_php

        # Create config pointing to ibl5_php database
        cp config.php.example config.php.parity
        sed -i "s/\$dbhost = getenv('DB_HOST') ?: 'localhost';/\$dbhost = '127.0.0.1';/" config.php.parity
        sed -i "s/\$dbuname = \"iblhoops_\";/\$dbuname = \"root\";/" config.php.parity
        sed -i "s/\$dbpass = \"password\";/\$dbpass = \"root\";/" config.php.parity
        sed -i "s/\$dbname = \"iblhoops_\";/\$dbname = \"ibl5_php\";/" config.php.parity
        cp config.php.parity config.php

        # Mark only the baseline as applied (batch 0) so migrate-seed guard passes,
        # then let php bin/migrate apply all subsequent migrations (001+).
        # Note: migrate-seed marks ALL files as applied, which defeats the purpose
        # of this test — we need the PHP runner to actually execute post-baseline migrations.
        mysql -h 127.0.0.1 -u root -proot ibl5_php \
          -e "CREATE TABLE IF NOT EXISTS migrations (id INT AUTO_INCREMENT PRIMARY KEY, migration VARCHAR(255) NOT NULL, batch INT NOT NULL);"
        mysql -h 127.0.0.1 -u root -proot ibl5_php \
          -e "INSERT INTO migrations (migration, batch) VALUES ('000_baseline_schema.sql', 0);"
        php bin/migrate

    - name: Dump and compare schemas
      run: |
        mysqldump -h 127.0.0.1 -u root -proot \
          --no-data --no-create-db --skip-comments --skip-triggers \
          --ignore-table=ibl5_bash.migrations \
          ibl5_bash | sed 's/ibl5_bash/COMPARED_DB/g' > /tmp/schema_bash.sql

        mysqldump -h 127.0.0.1 -u root -proot \
          --no-data --no-create-db --skip-comments --skip-triggers \
          --ignore-table=ibl5_php.migrations \
          ibl5_php | sed 's/ibl5_php/COMPARED_DB/g' > /tmp/schema_php.sql

        if diff /tmp/schema_bash.sql /tmp/schema_php.sql; then
          echo "PASS: Bash and PHP runners produce identical schemas."
        else
          echo "FAIL: Schema divergence detected between bash and PHP runners."
          exit 1
        fi

  schema-completeness:
    name: Schema Completeness
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: ibl5_completeness
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Apply all migrations
      run: |
        chmod +x ibl5/bin/run-migrations-ci.sh
        ibl5/bin/run-migrations-ci.sh -h 127.0.0.1 -u root -proot ibl5_completeness

    - name: Check FK integrity
      run: |
        # Find FK references to non-existent tables
        mysql -h 127.0.0.1 -u root -proot ibl5_completeness -N -e "
          SELECT
            CONCAT(kcu.TABLE_NAME, '.', kcu.COLUMN_NAME, ' -> ',
                   kcu.REFERENCED_TABLE_NAME, '.', kcu.REFERENCED_COLUMN_NAME)
          FROM information_schema.KEY_COLUMN_USAGE kcu
          WHERE kcu.TABLE_SCHEMA = 'ibl5_completeness'
            AND kcu.REFERENCED_TABLE_NAME IS NOT NULL
            AND kcu.REFERENCED_TABLE_NAME NOT IN (
              SELECT t.TABLE_NAME FROM information_schema.TABLES t
              WHERE t.TABLE_SCHEMA = 'ibl5_completeness'
            );
        " > /tmp/broken_fks.txt

        if [ -s /tmp/broken_fks.txt ]; then
          echo "FAIL: Foreign keys reference non-existent tables:"
          cat /tmp/broken_fks.txt
          exit 1
        fi
        echo "PASS: All FK references resolve."

    - name: Check required tables exist
      run: |
        # Tables selected by codebase reference frequency (top-used in Repository classes).
        # ibl_trades was removed — it never existed; the actual trade table is ibl_trade_info.
        REQUIRED_TABLES=(
          ibl_plr ibl_team_info ibl_schedule ibl_box_scores
          ibl_hist nuke_stories auth_users ibl_settings
          ibl_draft ibl_draft_picks ibl_demands ibl_awards
          ibl_trade_info ibl_standings
        )
        MISSING=""
        for table in "${REQUIRED_TABLES[@]}"; do
          count=$(mysql -h 127.0.0.1 -u root -proot ibl5_completeness -N -e "
            SELECT COUNT(*) FROM information_schema.TABLES
            WHERE TABLE_SCHEMA = 'ibl5_completeness' AND TABLE_NAME = '$table';
          ")
          if [ "$count" = "0" ]; then
            MISSING="$MISSING $table"
          fi
        done

        if [ -n "$MISSING" ]; then
          echo "FAIL: Required tables missing:$MISSING"
          exit 1
        fi
        echo "PASS: All ${#REQUIRED_TABLES[@]} required tables exist."

    - name: Check critical columns
      run: |
        # Verify key columns that the application depends on
        CHECKS=(
          "ibl_plr:pid,name,tid,pos,uuid"
          "ibl_team_info:teamid,team_city,team_name,uuid"
          "ibl_schedule:Date,Year,Visitor,Home,uuid"
          "ibl_settings:name,value"
          "ibl_draft_picks:pickid,ownerofpick,owner_tid,year,round"
          "ibl_trade_info:id,tradeofferid,itemid,trade_from,trade_to"
          "ibl_standings:tid,team_name,wins,losses,pct"
        )

        FAIL=0
        for check in "${CHECKS[@]}"; do
          table="${check%%:*}"
          columns="${check##*:}"
          IFS=',' read -ra cols <<< "$columns"
          for col in "${cols[@]}"; do
            count=$(mysql -h 127.0.0.1 -u root -proot ibl5_completeness -N -e "
              SELECT COUNT(*) FROM information_schema.COLUMNS
              WHERE TABLE_SCHEMA = 'ibl5_completeness'
                AND TABLE_NAME = '$table' AND COLUMN_NAME = '$col';
            ")
            if [ "$count" = "0" ]; then
              echo "FAIL: $table.$col missing"
              FAIL=1
            fi
          done
        done

        if [ "$FAIL" = "1" ]; then
          exit 1
        fi
        echo "PASS: All critical columns present."
