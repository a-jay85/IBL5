name: Mutation Testing

on:
  schedule:
    - cron: '0 3 * * 1'  # Monday 3am UTC
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutation:
    name: Infection PHP
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'mutation-test')
    timeout-minutes: 60

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: ibl5
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Check infection excludes
      working-directory: ibl5
      run: bin/check-infection-excludes

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.5'
        extensions: mbstring, intl, mysqli, pcov
        coverage: pcov

    - name: Cache vendor directory
      uses: actions/cache@v5
      with:
        path: ibl5/vendor
        key: ${{ runner.os }}-vendor-${{ hashFiles('ibl5/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-vendor-

    - name: Create config.php
      working-directory: ibl5
      run: cp config.php.example config.php

    - name: Install dependencies
      working-directory: ibl5
      run: composer install --no-progress --no-interaction

    - name: Apply migrations
      working-directory: ibl5
      run: bin/run-migrations-ci.sh -h 127.0.0.1 -u root -proot ibl5

    - name: Import seed data
      working-directory: ibl5
      run: mysql -h 127.0.0.1 -u root -proot ibl5 < tests/DatabaseIntegration/Fixtures/db-seed.sql

    - name: Generate coverage for Infection
      working-directory: ibl5
      env:
        DB_HOST: 127.0.0.1
        DB_USER: root
        DB_PASS: root
        DB_NAME: ibl5
      run: |
        mkdir -p coverage
        vendor/bin/phpunit \
          --configuration=phpunit-mutation.xml \
          --coverage-clover coverage/clover.xml \
          --coverage-xml coverage/coverage-xml \
          --log-junit coverage/junit.xml \
          --no-progress

    - name: Run Infection
      working-directory: ibl5
      run: |
        vendor/bin/infection \
          --configuration=infection.json5 \
          --coverage=coverage \
          --skip-initial-tests \
          --show-mutations \
          --no-progress

    - name: Upload mutation reports
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: mutation-reports
        path: |
          ibl5/infection.log
          ibl5/infection-report.html
          ibl5/infection-summary.log
        retention-days: 14

    - name: Post summary
      if: always()
      working-directory: ibl5
      run: |
        if [ -f infection-summary.log ]; then
          echo "## Mutation Testing Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat infection-summary.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        fi

  mutation-pr:
    name: Infection PHP (per-PR diff)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 15

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: ibl5
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Check infection excludes
      working-directory: ibl5
      run: bin/check-infection-excludes

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.5'
        extensions: mbstring, intl, mysqli, pcov
        coverage: pcov

    - name: Cache vendor directory
      uses: actions/cache@v5
      with:
        path: ibl5/vendor
        key: ${{ runner.os }}-vendor-${{ hashFiles('ibl5/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-vendor-

    - name: Create config.php
      working-directory: ibl5
      run: cp config.php.example config.php

    - name: Install dependencies
      working-directory: ibl5
      run: composer install --no-progress --no-interaction

    - name: Detect covered changes
      id: changes
      working-directory: ibl5
      run: |
        CHANGED=$(git diff --name-only --diff-filter=AM \
          origin/${{ github.base_ref }}...HEAD \
          -- 'classes/**/*.php' || true)
        if [ -z "$CHANGED" ]; then
          echo "skip=true" >> $GITHUB_OUTPUT
        else
          echo "skip=false" >> $GITHUB_OUTPUT
        fi

    - name: Check new files for test coverage
      if: steps.changes.outputs.skip == 'false'
      id: new-files
      working-directory: ibl5
      run: |
        GAPS=$(bin/check-new-class-coverage --base origin/${{ github.base_ref }})
        if [ -n "$GAPS" ]; then
          echo "has_gaps=true" >> $GITHUB_OUTPUT
          {
            echo "## New Classes Without Test Coverage"
            echo ""
            echo "These new files have no test referencing their class name:"
            echo '```'
            echo "$GAPS"
            echo '```'
            echo "_This is advisory — mutation testing cannot catch bugs in untested new code._"
          } > /tmp/new-class-warning.md
        else
          echo "has_gaps=false" >> $GITHUB_OUTPUT
        fi

    - name: Apply migrations
      if: steps.changes.outputs.skip == 'false'
      working-directory: ibl5
      run: bin/run-migrations-ci.sh -h 127.0.0.1 -u root -proot ibl5

    - name: Import seed data
      if: steps.changes.outputs.skip == 'false'
      working-directory: ibl5
      run: mysql -h 127.0.0.1 -u root -proot ibl5 < tests/DatabaseIntegration/Fixtures/db-seed.sql

    - name: Generate coverage
      if: steps.changes.outputs.skip == 'false'
      working-directory: ibl5
      env:
        DB_HOST: 127.0.0.1
        DB_USER: root
        DB_PASS: root
        DB_NAME: ibl5
      run: |
        mkdir -p coverage
        vendor/bin/phpunit \
          --configuration=phpunit-mutation.xml \
          --coverage-clover coverage/clover.xml \
          --coverage-xml coverage/coverage-xml \
          --log-junit coverage/junit.xml \
          --no-progress

    - name: Run Infection on diff
      if: steps.changes.outputs.skip == 'false'
      working-directory: ibl5
      run: |
        git config diff.relative true
        vendor/bin/infection \
          --configuration=infection.json5 \
          --coverage=coverage \
          --git-diff-base=origin/${{ github.base_ref }} \
          --git-diff-lines \
          --map-source-class-to-test \
          --only-covering-test-cases \
          --skip-initial-tests \
          --show-mutations \
          --no-progress \
          --min-msi=100 \
          --ignore-msi-with-no-mutations

    - name: Build mutation comment body
      if: always() && steps.changes.outputs.skip == 'false' && hashFiles('ibl5/infection-summary.log') != ''
      working-directory: ibl5
      run: |
        {
          echo "## Mutation Testing (Diff)"
          echo ""
          echo '```'
          cat infection-summary.log
          echo '```'
        } > /tmp/mutation-comment.md
        if [ -f /tmp/new-class-warning.md ]; then
          echo "" >> /tmp/mutation-comment.md
          cat /tmp/new-class-warning.md >> /tmp/mutation-comment.md
        fi

    - name: Post sticky mutation comment
      if: always() && steps.changes.outputs.skip == 'false' && hashFiles('ibl5/infection-summary.log') != ''
      uses: marocchino/sticky-pull-request-comment@v3
      with:
        header: mutation-comment
        path: /tmp/mutation-comment.md

    - name: Remove stale mutation comment
      if: always() && hashFiles('ibl5/infection-summary.log') == ''
      uses: marocchino/sticky-pull-request-comment@v3
      with:
        header: mutation-comment
        delete: true

    - name: Post summary
      if: always() && steps.changes.outputs.skip == 'false'
      working-directory: ibl5
      run: |
        if [ -f infection-summary.log ]; then
          echo "## Mutation Testing (Diff) Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat infection-summary.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        fi

  notify-mutation-failure:
    name: Notify Mutation Failure
    runs-on: ubuntu-latest
    needs: mutation
    if: ${{ always() && needs.mutation.result == 'failure' }}
    timeout-minutes: 5

    steps:
      - name: Setup SSH
        # Real prod host — the IBLbot Discord-DM endpoint is reachable only there.
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p ${{ secrets.PORT }} ${{ secrets.HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
        env:
          DEPLOY_KEY: ${{ secrets.PRIVATE_KEY }}

      - name: Send Discord DM
        env:
          OWNER_DISCORD_ID: ${{ secrets.OWNER_DISCORD_ID }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MSG=$(printf 'Weekly mutation testing FAILED (%s trigger).\n\nMSI dropped below 100%% — an escaped mutant or coverage regression. Check the run: %s' "${{ github.event_name }}" "$RUN_URL")

          PAYLOAD=$(jq -n --arg id "$OWNER_DISCORD_ID" --arg msg "$MSG" \
            '{content: {receivingUserDiscordID: $id, message: $msg}}')

          echo "$PAYLOAD" | ssh -p ${{ secrets.PORT }} -i ~/.ssh/id_deploy ${{ secrets.USERNAME }}@${{ secrets.HOST }} \
            'curl -s --max-time 10 -X POST http://localhost:50000/discordDM -H "Content-Type: application/json" -d @-' \
            || echo "IBLbot notification failed (bot may be down)"
