name: Human Sign-off

# Deterministic human-sign-off gate for feature PRs.
#
# Why this exists: the automouse autonomous pipeline (bin/automouse-run → /post-plan
# Phase 6.5) arms `gh pr merge --squash --auto`, and master's branch protection
# requires no reviews — so feature PRs merged unattended overnight (see the
# revert of #1073–#1076). A docs/frontmatter convention (#1072) could not stop
# this: the automouse path never reads it and GitHub has nothing to block on.
#
# This job IS that block. Once added to master's required status checks, a
# `feat:` PR stays un-mergeable (red required check) until a human inspects it
# and applies the `human-approved` label. `--auto` queues but GitHub never
# completes the merge while a required check is red. Non-feature work
# (fix/refactor/chore/docs/ci/revert/…) passes automatically, so the automouse
# pipeline can still auto-merge maintenance.

on:
  pull_request:
    branches: [ master ]
    # labeled/unlabeled re-run the gate so applying the label flips red→green;
    # edited re-runs when the title (the classifier input) changes.
    types: [opened, reopened, synchronize, edited, ready_for_review, labeled, unlabeled]
  # On a merge_group, github.event.pull_request is null; the run step resolves
  # every batched PR from the commit range instead (ADR-0072 / D2).
  merge_group:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: human-signoff-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  human-signoff:
    name: human-signoff
    runs-on: ubuntu-latest
    steps:
      # Checkout is required so the run step can source the shared classifier lib.
      # fetch-depth: 0 lets the merge_group branch run `git log base..head`.
      - name: Checkout (for the shared classifier lib)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Require human sign-off for feature PRs
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          TITLE: ${{ github.event.pull_request.title }}
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          MG_BASE_SHA: ${{ github.event.merge_group.base_sha }}
          MG_HEAD_SHA: ${{ github.event.merge_group.head_sha }}
        run: |
          set -euo pipefail
          # shellcheck source=bin/lib/human-signoff-classifier.sh
          source bin/lib/human-signoff-classifier.sh

          if [ "$EVENT_NAME" = "merge_group" ]; then
            # Defense-in-depth: every batched PR re-checked (ADR-0072 / D3).
            hs_eval_merge_group "$MG_BASE_SHA" "$MG_HEAD_SHA"
          else
            # Entry gate (unchanged behaviour) — blocks a feat: PR from the queue.
            hs_eval_pull_request "$TITLE" "$LABELS"
          fi
