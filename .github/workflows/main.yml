name: Build and Deploy
on:
  push:
    branches:
      - production

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: rm -f package-lock.json && npm install
        working-directory: ibl5

      - name: Build CSS
        run: npx @tailwindcss/cli -i design/input.css -o themes/IBL/style/style.css --minify
        working-directory: ibl5

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p ${{ secrets.PORT }} ${{ secrets.HOST }} >> ~/.ssh/known_hosts 2>/dev/null
        env:
          DEPLOY_KEY: ${{ secrets.PRIVATE_KEY }}

      - name: Stop IBL6 to free resources for deploy
        run: |
          ssh -p ${{ secrets.PORT }} -i ~/.ssh/id_deploy ${{ secrets.USERNAME }}@${{ secrets.HOST }} '
            if pkill -f "node build/index[.]js"; then
              echo "SIGTERM sent, waiting for process to exit..."
              for i in $(seq 1 10); do
                if ! pgrep -f "node build/index[.]js" > /dev/null 2>&1; then
                  echo "IBL6 stopped gracefully"
                  exit 0
                fi
                sleep 1
              done
              echo "Process still alive after 10s, sending SIGKILL..."
              pkill -9 -f "node build/index[.]js" || true
              sleep 1
              echo "IBL6 force-killed"
            else
              echo "IBL6 was not running"
            fi
          '

      - name: Pull latest code on server
        run: |
          ssh -p ${{ secrets.PORT }} -i ~/.ssh/id_deploy ${{ secrets.USERNAME }}@${{ secrets.HOST }} '
            set -e
            cd www
            git fetch origin
            git reset --hard origin/production
          '

      - name: Install PHP dependencies
        run: |
          ssh -p ${{ secrets.PORT }} -i ~/.ssh/id_deploy ${{ secrets.USERNAME }}@${{ secrets.HOST }} '
            set -e
            cd www/ibl5
            composer install --no-dev --no-interaction --optimize-autoloader
          '

      - name: Run database migrations
        run: |
          ssh -p ${{ secrets.PORT }} -i ~/.ssh/id_deploy ${{ secrets.USERNAME }}@${{ secrets.HOST }} '
            set -e
            cd www
            php ibl5/bin/migrate
          '

      - name: Validate database schema
        run: |
          ssh -p ${{ secrets.PORT }} -i ~/.ssh/id_deploy ${{ secrets.USERNAME }}@${{ secrets.HOST }} '
            set -e
            cd www
            php ibl5/bin/validate-schema
          '

      - name: Deploy compiled CSS to server
        run: scp -P ${{ secrets.PORT }} -i ~/.ssh/id_deploy ibl5/themes/IBL/style/style.css ${{ secrets.USERNAME }}@${{ secrets.HOST }}:www/ibl5/themes/IBL/style/style.css

      - name: Flush OPcache
        run: |
          ssh -p ${{ secrets.PORT }} -i ~/.ssh/id_deploy ${{ secrets.USERNAME }}@${{ secrets.HOST }} '
            killall lsphp && echo "OPcache flushed (lsphp workers killed)" || echo "No lsphp processes found"
          '

      - name: Purge page cache
        run: |
          ssh -p ${{ secrets.PORT }} -i ~/.ssh/id_deploy ${{ secrets.USERNAME }}@${{ secrets.HOST }} '
            cd www/ibl5
            php -r "require \"vendor/autoload.php\"; echo \"Purged \" . Cache\PageCache::purge() . \" cached pages\" . PHP_EOL;"
          '

      - name: Check for IBLbot changes
        id: iblbot-changes
        run: |
          if git diff --name-only ${{ github.event.before }}..${{ github.sha }} | grep -qE '^(ibl5/IBLbot/|\.github/workflows/main\.yml)'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy and restart IBLbot
        if: steps.iblbot-changes.outputs.changed == 'true'
        run: |
          ssh -p ${{ secrets.PORT }} -i ~/.ssh/id_deploy ${{ secrets.USERNAME }}@${{ secrets.HOST }} '
            set -e
            cd www/ibl5/IBLbot

            echo "Installing dependencies..."
            npm install --include=dev

            echo "Building TypeScript..."
            npm run build

            echo "Registering slash commands..."
            npm run deploy-commands

            echo "Stopping old bot process..."
            if [ -f bot.pid ] && kill -0 "$(cat bot.pid)" 2>/dev/null; then
              kill "$(cat bot.pid)"
              sleep 2
            fi

            echo "Starting new bot process..."
            mkdir -p logs
            setsid node dist/index.js > logs/bot.log 2>&1 < /dev/null &
            echo $! > bot.pid
            sleep 1

            echo "IBLbot deployed successfully (PID: $(cat bot.pid))"
          '

      - name: Check for IBL6 changes
        id: ibl6-changes
        run: |
          if git diff --name-only ${{ github.event.before }}..${{ github.sha }} | grep -qE '^(IBL6/|\.github/workflows/main\.yml)'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build IBL6
        if: steps.ibl6-changes.outputs.changed == 'true'
        run: npm ci && npm run build
        working-directory: IBL6

      - name: Deploy IBL6 build to server
        if: steps.ibl6-changes.outputs.changed == 'true'
        run: |
          ssh -p ${{ secrets.PORT }} -i ~/.ssh/id_deploy ${{ secrets.USERNAME }}@${{ secrets.HOST }} 'rm -rf www/IBL6/build'
          scp -r -P ${{ secrets.PORT }} -i ~/.ssh/id_deploy IBL6/build ${{ secrets.USERNAME }}@${{ secrets.HOST }}:www/IBL6/

      - name: Install IBL6 deps and deploy build
        if: steps.ibl6-changes.outputs.changed == 'true'
        run: |
          ssh -p ${{ secrets.PORT }} -i ~/.ssh/id_deploy ${{ secrets.USERNAME }}@${{ secrets.HOST }} '
            set -e
            cd www/IBL6

            echo "Installing production dependencies..."
            npm ci --omit=dev
          '

      - name: Start IBL6
        if: ${{ !cancelled() }}
        run: |
          ssh -p ${{ secrets.PORT }} -i ~/.ssh/id_deploy ${{ secrets.USERNAME }}@${{ secrets.HOST }} '
            cd www/IBL6
            mkdir -p logs
            setsid env PORT=3001 UV_THREADPOOL_SIZE=2 node --max-old-space-size=128 build/index.js > logs/ibl6.log 2>&1 < /dev/null &
            echo $! > ibl6.pid
            sleep 1
            echo "IBL6 started (PID: $(cat ibl6.pid))"
          '

  notify-deploy-failure:
    name: Notify Deploy Failure
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: ${{ always() && needs.build-and-deploy.result == 'failure' }}
    timeout-minutes: 5

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p ${{ secrets.PORT }} ${{ secrets.HOST }} >> ~/.ssh/known_hosts 2>/dev/null
        env:
          DEPLOY_KEY: ${{ secrets.PRIVATE_KEY }}

      - name: Send Discord DM
        env:
          OWNER_DISCORD_ID: ${{ secrets.OWNER_DISCORD_ID }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          MSG=$(printf 'Production deploy FAILED for commit %s.\n\nCheck the run for details: %s' "$SHORT_SHA" "$RUN_URL")

          PAYLOAD=$(jq -n --arg id "$OWNER_DISCORD_ID" --arg msg "$MSG" \
            '{content: {receivingUserDiscordID: $id, message: $msg}}')

          echo "$PAYLOAD" | ssh -p ${{ secrets.PORT }} -i ~/.ssh/id_deploy ${{ secrets.USERNAME }}@${{ secrets.HOST }} \
            'curl -s --max-time 10 -X POST http://localhost:50000/discordDM -H "Content-Type: application/json" -d @-' \
            || echo "IBLbot notification failed (bot may be down)"
