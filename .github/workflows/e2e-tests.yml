name: E2E Tests

on:
  pull_request:
    branches: [master]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      # --- Dependency Caching ---
      - name: Cache vendor directory
        uses: actions/cache@v5
        with:
          path: ibl5/vendor
          key: ${{ runner.os }}-vendor-${{ hashFiles('ibl5/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-vendor-

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: ibl5/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('ibl5/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install JS dependencies
        working-directory: ibl5
        run: bun install

      - name: Get Playwright version
        id: playwright-version
        working-directory: ibl5
        run: echo "version=$(bunx playwright --version)" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: ibl5
        run: bunx playwright install chromium --with-deps

      - name: Restore Playwright system deps from cache
        uses: actions/cache/restore@v5
        id: apt-cache
        with:
          path: ~/playwright-apt-cache
          key: ${{ runner.os }}-playwright-apt-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright system deps
        working-directory: ibl5
        run: |
          if [ -d ~/playwright-apt-cache ] && ls ~/playwright-apt-cache/*.deb 1>/dev/null 2>&1; then
            echo "Installing $(ls ~/playwright-apt-cache/*.deb | wc -l) cached .deb files"
            sudo cp ~/playwright-apt-cache/*.deb /var/cache/apt/archives/
          fi
          bunx playwright install-deps chromium

      - name: Install Composer dependencies
        working-directory: ibl5
        run: composer install --no-interaction --no-progress --prefer-dist --ignore-platform-reqs

      # --- App Setup (must exist before Docker build) ---
      - name: Create config.php
        working-directory: ibl5
        run: |
          cat > config.php <<'PHPCFG'
          <?php
          if (realpath(__FILE__) === realpath($_SERVER['SCRIPT_FILENAME'])) {
              header("Location: index.php");
              exit();
          }
          $display_errors = true;
          $dbhost = getenv('DB_HOST') ?: '127.0.0.1';
          $dbuname = 'root';
          $dbpass = 'root';
          $dbname = 'ibl5';
          $prefix = 'nuke';
          $user_prefix = 'nuke';
          $dbtype = 'MySQL';
          $sitekey = 'ci-test-key-not-secret';
          $subscription_url = '';
          $admin_file = 'admin';
          PHPCFG

      - name: Build CSS
        working-directory: ibl5
        run: bunx @tailwindcss/cli -i design/input.css -o themes/IBL/style/style.css

      # --- Docker Compose ---
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull or build PHP image
        run: |
          if ! docker pull ghcr.io/a-jay85/ibl5/php-apache:latest 2>/dev/null; then
            echo "GHCR image not found, building locally..."
            docker build -t ghcr.io/a-jay85/ibl5/php-apache:latest .
          fi

      - name: Start Docker containers
        run: docker compose -f docker-compose.ci.yml up -d --wait

      # --- Database Setup ---
      - name: Create database and apply migrations
        run: |
          chmod +x ibl5/bin/run-migrations-ci.sh
          ibl5/bin/run-migrations-ci.sh -h 127.0.0.1 -u root -proot ibl5

      - name: Import seed data
        run: |
          docker compose -f docker-compose.ci.yml exec -T mariadb \
            mariadb -u root -proot ibl5 < ibl5/tests/e2e/fixtures/ci-seed.sql

      - name: Create test user
        env:
          IBL_TEST_USER: ${{ secrets.IBL_TEST_USER }}
          IBL_TEST_PASS: ${{ secrets.IBL_TEST_PASS }}
        run: |
          docker compose -f docker-compose.ci.yml exec \
            -e IBL_TEST_USER="$IBL_TEST_USER" \
            -e IBL_TEST_PASS="$IBL_TEST_PASS" \
            -T php php <<'PHPSCRIPT'
          <?php
          $hash = password_hash(getenv('IBL_TEST_PASS'), PASSWORD_BCRYPT);
          $user = getenv('IBL_TEST_USER');
          $email = 'ci-test@example.com';
          $db = new mysqli('mariadb', 'root', 'root', 'ibl5');

          // roles_mask = 1 grants ADMIN role (Delight\Auth\Role::ADMIN)
          // Required for admin page E2E tests (updateAllTheThings.php, block.php)
          $stmt = $db->prepare("INSERT INTO auth_users (email, password, username, status, verified, resettable, roles_mask, registered, force_logout) VALUES (?, ?, ?, 0, 1, 1, 1, ?, 0)");
          $time = time();
          $stmt->bind_param('sssi', $email, $hash, $user, $time);
          $stmt->execute();

          $stmt = $db->prepare("INSERT INTO nuke_users (username, user_email, user_ibl_team, user_password, name, user_avatar, bio, ublock, theme, user_regdate) VALUES (?, ?, 'Metros', ?, 'CI Test User', '', '', '', '', NOW())");
          $stmt->bind_param('sss', $user, $email, $hash);
          $stmt->execute();

          $stmt = $db->prepare("UPDATE ibl_team_info SET gm_username = ? WHERE team_name = 'Metros'");
          $stmt->bind_param('s', $user);
          $stmt->execute();

          $db->close();
          echo "Test user created: $user\n";
          PHPSCRIPT

      # --- Visual Regression Baselines ---
      - name: Generate missing visual regression baselines
        id: baselines
        working-directory: ibl5
        env:
          BASE_URL: http://localhost:8080/ibl5/
          IBL_TEST_USER: ${{ secrets.IBL_TEST_USER }}
          IBL_TEST_PASS: ${{ secrets.IBL_TEST_PASS }}
        run: |
          SNAP_DIR="tests/e2e/smoke/visual-regression.spec.ts-snapshots"
          if ! ls "$SNAP_DIR"/*-linux.png 1>/dev/null 2>&1; then
            echo "No Linux baselines found — generating..."
            bunx playwright test tests/e2e/smoke/visual-regression.spec.ts --update-snapshots
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add "$SNAP_DIR"/*-linux.png
            git commit -m "ci: generate Linux visual regression baselines"
            git push
            echo "generated=true" >> $GITHUB_OUTPUT
          else
            echo "Linux baselines already exist — skipping generation"
            echo "generated=false" >> $GITHUB_OUTPUT
          fi

      # --- Run Tests ---
      - name: Run E2E tests
        working-directory: ibl5
        env:
          BASE_URL: http://localhost:8080/ibl5/
          IBL_TEST_USER: ${{ secrets.IBL_TEST_USER }}
          IBL_TEST_PASS: ${{ secrets.IBL_TEST_PASS }}
          BASELINES_GENERATED: ${{ steps.baselines.outputs.generated }}
        run: |
          if [ "$BASELINES_GENERATED" = "true" ]; then
            echo "Baselines just generated — skipping visual regression comparison this run"
            bunx playwright test --grep-invert "Visual regression"
          else
            bunx playwright test
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: ibl5/playwright-report/
          retention-days: 7

      - name: Upload snapshot diffs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: snapshot-diffs
          path: ibl5/test-results/
          retention-days: 7

      - name: Stop Docker containers
        if: always()
        run: docker compose -f docker-compose.ci.yml down
